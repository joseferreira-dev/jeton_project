<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
</head>

<body>

    <!-- ============================================================
         ÁREA DE UPLOAD DE ANEXO
         Uso:
         <div th:replace="~{fragments/upload-anexo :: upload(comprovante=${atividade.comprovante}, listaTipos=${listaTiposAnexo})}"></div>

         Parâmetros:
         - comprovante: objeto Comprovante (pode ser null)
         - listaTipos: lista de TipoAnexo (obrigatório)
         - nomeInput: nome do campo "nomeComprovanteUsuario" (padrão: 'nomeComprovanteUsuario')
         - tipoInput: nome do campo "idTipoAnexo" (padrão: 'idTipoAnexo')
         - fileInput: nome do campo "file" (padrão: 'file')
         - exibirArquivoAtual: booleano para exibir o nome do arquivo atual (padrão: true)
    ============================================================ -->
    <!-- Assinatura com valores padrão -->
    <th:block th:fragment="upload(comprovante, listaTipos, nomeInput, tipoInput, fileInput, exibirArquivoAtual)">
        <div class="card bg-light border-dashed">
            <div class="card-body">
                <h6 class="fw-bold mb-3">
                    <i class="fa-solid fa-paperclip me-2"></i>Anexar Comprovante
                </h6>
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label small fw-bold">Nome do Comprovante</label>
                        <input type="text" class="form-control form-control-sm" th:name="${nomeInput}"
                            th:value="${comprovante != null ? comprovante.nomeComprovante : ''}"
                            placeholder="Ex: Ata de Reunião (18/05/26)"
                            title="Dê um nome descritivo ao comprovante para identificação futura">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Tipo de Documento</label>
                        <select class="form-select form-select-sm" th:name="${tipoInput}"
                            title="Selecione o tipo de documento anexado (PDF, imagem, etc.)">
                            <option value="">Selecione o Tipo</option>
                            <option th:each="t : ${listaTipos}" th:value="${t.idTipo}" th:text="${t.nome}"
                                th:selected="${comprovante != null and comprovante.tipoAnexo != null and comprovante.tipoAnexo.idTipo == t.idTipo}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label small fw-bold">Arquivo (PDF ou Imagem)</label>
                        <div class="file-upload-container">
                            <input type="file" class="form-control form-control-sm" th:name="${fileInput}"
                                accept=".pdf,image/*" data-role="file-upload"
                                title="Envie o comprovante em formato PDF ou imagem (JPG, PNG)">
                        </div>
                    </div>
                </div>
                <div th:if="${exibirArquivoAtual and comprovante != null}" class="mt-3">
                    <span class="badge bg-success">
                        <i class="fa-solid fa-file-circle-check me-1"></i>
                        Arquivo atual: <span th:text="${comprovante.nomeArquivo}"></span>
                    </span>
                    <small class="text-muted ms-2">(Substitua selecionando um novo arquivo)</small>
                </div>
            </div>
        </div>
    </th:block>

</body>

</html>
