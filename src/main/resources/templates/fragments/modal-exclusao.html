<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
</head>

<body>

    <!-- ============================================================
         MODAL DE EXCLUSÃO
         Uso: <div th:replace="~{fragments/modal-exclusao :: modal}"></div>
         Espera que o JavaScript utilize os IDs:
         - modalExclusao
         - excluirNome
         - excluirExtra
         - btnConfirmarExclusao
    ============================================================ -->
    <th:block th:fragment="modal">
        <div class="modal fade" id="modalExclusao" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-circle-exclamation me-2"></i>Confirmar Exclusão
                        </h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body p-4">
                        <p>Deseja excluir permanentemente o registro abaixo?</p>
                        <div class="card bg-light border-start border-danger border-4">
                            <div class="card-body py-2">
                                <div><strong>Nome:</strong> <span id="excluirNome" class="text-dark"></span></div>
                                <div><strong>Detalhe:</strong> <span id="excluirExtra" class="text-dark"></span></div>
                            </div>
                        </div>
                        <p class="text-danger small mt-3 mb-0">
                            <i class="fa-solid fa-triangle-exclamation me-1"></i> Esta ação não poderá ser desfeita.
                        </p>
                    </div>
                    <div class="modal-footer bg-light">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <a id="btnConfirmarExclusao" href="#" class="btn btn-danger px-4">
                            <i class="fa-solid fa-trash-can me-1"></i> Excluir
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

</body>

</html>
