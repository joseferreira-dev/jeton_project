<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Formulário de Regras Conjuntas - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-link me-2"></i>
                <span
                    th:text="${regrasConjuntas.idRegraConjunta == null ? 'Nova Regra Conjunta' : 'Editar Regra Conjunta'}"></span>
            </h2>
        </div>

        <form th:action="@{/regras-conjuntas/salvar}" th:object="${regrasConjuntas}" method="post"
            id="formRegrasConjuntas">
            <input type="hidden" th:field="*{idRegraConjunta}">

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-light fw-bold">Parâmetros do Limite Conjunto</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nome do Agrupamento</label>
                                <input type="text" class="form-control" th:field="*{nomeRegra}"
                                    placeholder="Ex: Reunião de Diretória + Sindicância"
                                    data-validate="required minlength:3 maxlength:50" required
                                    title="Nome do agrupamento de regras">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Teto Máximo (Pontos Limite)</label>
                                <input type="number" step="1" class="form-control" th:field="*{pontosLimite}"
                                    placeholder="Ex: 5" data-validate="required number min:1" required
                                    title="Teto máximo de pontos que o conjunto de regras pode acumular">
                                <small class="text-muted">As atividades selecionadas não poderão ultrapassar este
                                    somatório.</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Este limite aplica-se por:</label>
                                <select class="form-select" th:field="*{inTipoLimite}" data-validate="required" required
                                    title="Período de aplicação do limite: Diário, Turno ou Mensal">
                                    <option value="D">Diário (Por Dia)</option>
                                    <option value="T">Por Turno (Manhã/Tarde/Noite)</option>
                                    <option value="M">Mensal (Por Mês)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-light fw-bold">
                            <i class="fa-solid fa-list-check me-2"></i>Atividades Vinculadas a este Teto
                        </div>
                        <div class="card-body d-flex flex-column">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Filtrar por Resolução</label>
                                <select class="form-select" id="selectResolucaoFiltro">
                                    <option th:each="r : ${listaResolucoes}" th:value="${r.idResolucao}"
                                        th:text="${'Resolução ' + r.numero + '/' + r.ano}"></option>
                                </select>
                                <small class="text-muted">Selecione uma resolução para filtrar as regras
                                    disponíveis.</small>
                            </div>

                            <label class="form-label fw-bold mb-2">Regras (Segure CTRL para
                                selecionar várias):</label>
                            <select multiple class="form-select flex-grow-1" style="min-height: 250px;"
                                name="regrasAgrupadas" id="selectRegras" data-validate="required"
                                title="Selecione uma ou mais regras para compor este agrupamento (Ctrl+Clique para múltiplas)">
                            </select>

                            <input type="hidden" id="regrasSelecionadasIds" th:value="${regrasSelecionadasIds}">
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4">
                <a th:href="@{/regras-conjuntas}" class="btn btn-outline-secondary me-2">Cancelar</a>
                <button type="submit" class="btn btn-success">Salvar Agrupamento</button>
            </div>
        </form>
    </div>
</body>

</html>
