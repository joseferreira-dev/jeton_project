<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Regras de Pontuação - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-cremepe fw-bold"><i class="fa-solid fa-list-check me-2"></i> Gestão de Regras de
                Pontuação</h2>
            <a th:href="@{/regras/novo}" class="btn btn-cremepe"><i class="fa-solid fa-plus me-1"></i> Nova Regra</a>
        </div>

        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show"><i
                class="fa-solid fa-check-circle me-1"></i> <span th:text="${sucesso}"></span><button type="button"
                class="btn-close" data-bs-dismiss="alert"></button></div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show"><i
                class="fa-solid fa-triangle-exclamation me-1"></i> <span th:text="${erro}"></span><button type="button"
                class="btn-close" data-bs-dismiss="alert"></button></div>

        <form th:action="@{/regras}" method="get" class="mb-4 bg-white p-3 rounded shadow-sm border border-light">
            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="dir" th:value="${dir}">
            <div class="row g-2 align-items-center">
                <div class="col-md-3">
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fa-solid fa-magnifying-glass"></i></span>
                        <input type="text" name="termo" th:value="${termo}" class="form-control"
                            placeholder="Buscar Atividade...">
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="input-group">
                        <label class="input-group-text bg-light" for="situacao">Estado</label>
                        <select name="situacao" id="situacao" class="form-select" onchange="this.form.submit()">
                            <option value="">Todos</option>
                            <option value="N" th:selected="${situacao == 'N'}">Em Vigor</option>
                            <option value="S" th:selected="${situacao == 'S'}">Revogada</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="input-group">
                        <label class="input-group-text bg-light" for="judicante">Judicante</label>
                        <select name="judicante" id="judicante" class="form-select" onchange="this.form.submit()">
                            <option value="">Todos</option>
                            <option value="S" th:selected="${judicante == 'S'}">Sim</option>
                            <option value="N" th:selected="${judicante == 'N'}">Não</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-2">
                    <div class="input-group">
                        <label class="input-group-text bg-light" for="size">Exibir</label>
                        <select name="size" id="size" class="form-select" onchange="this.form.submit()">
                            <option value="10" th:selected="${size == 10}">10</option>
                            <option value="20" th:selected="${size == 20}">20</option>
                            <option value="50" th:selected="${size == 50}">50</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-cremepe w-100">Filtrar</button>
                </div>
            </div>
        </form>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light" style="border-bottom: 2px solid var(--cremepe-gold);">
                            <tr>
                                <th class="ps-4">
                                    <a th:href="@{/regras(page=0, size=${size}, termo=${termo}, situacao=${situacao}, judicante=${judicante}, sort='nomeRegra', dir=${sort == 'nomeRegra' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        Atividade (Regra)
                                        <i
                                            th:class="${sort == 'nomeRegra'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th>Normativa Base</th>
                                <th>
                                    <a th:href="@{/regras(page=0, size=${size}, termo=${termo}, situacao=${situacao}, judicante=${judicante}, sort='pontos', dir=${sort == 'pontos' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        Pontos
                                        <i
                                            th:class="${sort == 'pontos'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th>Lim. Turno</th>
                                <th class="text-center">Judicante</th>
                                <th class="text-center pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${paginaRegras.content}"
                                th:classappend="${r.inRevogado == 'S'} ? 'table-light text-muted'">
                                <td class="ps-4 fw-bold text-cremepe" th:text="${r.nomeRegra}">Nome</td>
                                <td>
                                    <span th:if="${r.resolucao != null}" class="badge bg-secondary me-1"
                                        th:text="${'Res. ' + r.resolucao.numero + '/' + r.resolucao.ano}"></span>
                                    <span th:if="${r.portaria != null}" class="badge bg-info text-dark"
                                        th:text="${'Port. ' + r.portaria.numero + '/' + r.portaria.ano}"></span>
                                </td>
                                <td class="fw-bold text-success" th:text="${r.pontos}"></td>
                                <td th:text="${r.pontosLimitesTurno}"></td>
                                <td class="text-center"><span th:text="${r.inJudicante == 'S' ? 'Sim' : 'Não'}"
                                        th:classappend="${r.inJudicante == 'S'} ? 'badge bg-dark' : 'badge bg-light text-muted'"></span>
                                </td>
                                <td class="text-center pe-4">
                                    <a th:href="@{'/regras/editar/' + ${r.idRegra}}"
                                        class="btn btn-sm btn-outline-primary me-1" title="Editar">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </a>

                                    <a th:href="@{'/regras/deletar/' + ${r.idRegra}}"
                                        class="btn btn-sm btn-outline-danger btn-confirm me-1"
                                        title="Excluir Definitivamente">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </a>

                                    <a th:if="${r.inRevogado == 'N'}" th:href="@{'/regras/excluir/' + ${r.idRegra}}"
                                        class="btn btn-sm btn-outline-warning btn-confirm me-1" title="Revogar Regra">
                                        <i class="fa-solid fa-ban"></i>
                                    </a>

                                    <a th:if="${r.inRevogado == 'S'}" th:href="@{'/regras/restaurar/' + ${r.idRegra}}"
                                        class="btn btn-sm btn-outline-success btn-confirm" title="Restaurar Regra">
                                        <i class="fa-solid fa-rotate-left"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${paginaRegras.empty}">
                                <td colspan="6" class="text-center py-4 text-muted">Nenhuma regra encontrada para os
                                    filtros aplicados.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card-footer bg-white border-top-0 py-3" th:if="${size != 0 and paginaRegras.totalPages > 1}"
                th:with="start=${paginaRegras.number > 2 ? paginaRegras.number - 2 : 0}, 
                      end=${paginaRegras.number + 2 < paginaRegras.totalPages - 1 ? paginaRegras.number + 2 : paginaRegras.totalPages - 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${paginaRegras.first} ? 'disabled'"><a class="page-link"
                                th:href="@{/regras(page=${paginaRegras.number - 1}, size=${size}, termo=${termo}, situacao=${situacao}, judicante=${judicante}, sort=${sort}, dir=${dir})}">Anterior</a>
                        </li>

                        <li class="page-item" th:if="${start > 0}"><a class="page-link"
                                th:href="@{/regras(page=0, size=${size}, termo=${termo}, situacao=${situacao}, judicante=${judicante}, sort=${sort}, dir=${dir})}">1</a>
                        </li>
                        <li class="page-item disabled" th:if="${start > 1}"><a class="page-link" href="#">...</a></li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(start, end)}"
                            th:classappend="${paginaRegras.number == i} ? 'active'">
                            <a class="page-link"
                                th:href="@{/regras(page=${i}, size=${size}, termo=${termo}, situacao=${situacao}, judicante=${judicante}, sort=${sort}, dir=${dir})}"
                                th:text="${i + 1}">1</a>
                        </li>

                        <li class="page-item disabled" th:if="${end < paginaRegras.totalPages - 2}"><a class="page-link"
                                href="#">...</a></li>
                        <li class="page-item" th:if="${end < paginaRegras.totalPages - 1}"><a class="page-link"
                                th:href="@{/regras(page=${paginaRegras.totalPages - 1}, size=${size}, termo=${termo}, situacao=${situacao}, judicante=${judicante}, sort=${sort}, dir=${dir})}"
                                th:text="${paginaRegras.totalPages}">10</a></li>

                        <li class="page-item" th:classappend="${paginaRegras.last} ? 'disabled'"><a class="page-link"
                                th:href="@{/regras(page=${paginaRegras.number + 1}, size=${size}, termo=${termo}, situacao=${situacao}, judicante=${judicante}, sort=${sort}, dir=${dir})}">Próxima</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>

</html>
