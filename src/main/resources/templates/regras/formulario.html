<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Formulário de Regra - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-list-check me-2"></i>
                <span th:text="${regra.idRegra == null ? 'Nova Regra de Pontuação' : 'Editar Regra'}"></span>
            </h2>
        </div>

        <form th:action="@{/regras/salvar}" th:object="${regra}" method="post">
            <input type="hidden" th:field="*{idRegra}">
            <input type="hidden" th:field="*{inRevogado}">

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-light fw-bold">Dados da Atividade</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nome da Regra / Atividade</label>
                                <input type="text" class="form-control" th:field="*{nomeRegra}"
                                    placeholder="Ex: Reunião de Câmara Técnica"
                                    data-validate="required minlength:3 maxlength:70" required
                                    title="Nome descritivo da regra/atividade">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Descrição Detalhada</label>
                                <textarea class="form-control" th:field="*{descricao}" rows="4"
                                    title="Descrição detalhada da atividade (opcional)"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Esta é uma Atividade Judicante?</label>
                                <select class="form-select" th:field="*{inJudicante}" required>
                                    <option value="N">Não</option>
                                    <option value="S">Sim</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-header fw-bold"><i class="fa-solid fa-calculator me-2"></i>Matemática e Base
                            Legal</div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Pontos Base</label>
                                    <input type="number" step="1" class="form-control" th:field="*{pontos}"
                                        data-validate="required number min:0" required
                                        title="Pontos base que esta atividade gera">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Teto por Turno</label>
                                    <input type="number" step="1" class="form-control" th:field="*{pontosLimitesTurno}"
                                        data-validate="required number min:0" required
                                        title="Limite máximo de pontos que podem ser acumulados por turno com esta atividade">
                                </div>
                                <div class="col-md-12 mt-4">
                                    <label class="form-label fw-bold"><i
                                            class="fa-solid fa-scale-balanced text-muted me-1"></i> Resolução
                                        Vinculada</label>
                                    <select class="form-select" th:field="*{resolucao.idResolucao}"
                                        data-validate="required" title="Resolução que fundamenta esta regra">
                                        <option value="">Nenhuma Resolução</option>
                                        <option th:each="r : ${listaResolucoes}" th:value="${r.idResolucao}"
                                            th:text="${'Resolução ' + r.numero + '/' + r.ano}"></option>
                                    </select>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold"><i
                                            class="fa-solid fa-file-signature text-muted me-1"></i> Portaria
                                        Vinculada</label>
                                    <select class="form-select" th:field="*{portaria.idPortaria}"
                                        title="Portaria que complementa a resolução (opcional)">
                                        <option value="">Nenhuma Portaria</option>
                                        <option th:each="p : ${listaPortarias}" th:value="${p.idPortaria}"
                                            th:text="${'Portaria ' + p.numero + '/' + p.ano}"></option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4">
                <a th:href="@{/regras}" class="btn btn-outline-secondary me-2">Cancelar</a>
                <button type="submit" class="btn btn-success">Salvar Regra</button>
            </div>
        </form>
    </div>
</body>

</html>
