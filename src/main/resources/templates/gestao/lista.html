<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Gestões - Cremepe</title>
</head>

<body>
    <div layout:fragment="conteudo">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-cremepe fw-bold"><i class="fa-solid fa-calendar-days me-2"></i> Gestões</h2>
            <a th:href="@{/gestoes/novo}" class="btn btn-success"><i class="fa-solid fa-plus me-1"></i> Nova Gestão</a>
        </div>

        <form th:action="@{/gestoes}" method="get" class="mb-4" data-guard-ignore>
            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="dir" th:value="${dir}">

            <div class="card shadow-sm border-success mb-4">
                <div class="card-header bg-success text-white fw-bold">
                    <i class="fa-solid fa-filter me-2"></i> Filtrar Gestões
                </div>
                <div class="card-body p-4">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-8">
                            <label class="form-label fw-bold small text-muted">Pesquisar (Nome da Gestão)</label>
                            <input type="text" name="termo" th:value="${termo}" class="form-control"
                                placeholder="Buscar pelo nome da gestão...">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">Exibir</label>
                            <select name="size" id="size" class="form-select" onchange="this.form.submit()">
                                <option value="10" th:selected="${size == 10}">10 registros</option>
                                <option value="20" th:selected="${size == 20}">20 registros</option>
                                <option value="50" th:selected="${size == 50}">50 registros</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2 bg-light p-3 rounded">
                        <a th:href="@{/gestoes}" class="btn btn-outline-secondary fw-bold px-4">
                            <i class="fa-solid fa-eraser me-1"></i> Limpar Filtros
                        </a>
                        <button type="submit" class="btn btn-success fw-bold px-4">
                            <i class="fa-solid fa-magnifying-glass me-1"></i> Aplicar Filtro
                        </button>
                    </div>
                </div>
            </div>
        </form>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4"><a
                                        th:href="@{/gestoes(page=${paginaGestoes.number}, size=${size}, termo=${termo}, sort='nomeGestao', dir=${sort == 'nomeGestao' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-decoration-none text-dark">Nome <i
                                            th:class="${sort == 'nomeGestao'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i></a>
                                </th>
                                <th><a th:href="@{/gestoes(page=${paginaGestoes.number}, size=${size}, termo=${termo}, sort='dtInicio', dir=${sort == 'dtInicio' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-decoration-none text-dark">Data de Início <i
                                            th:class="${sort == 'dtInicio'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i></a>
                                </th>
                                <th><a th:href="@{/gestoes(page=${paginaGestoes.number}, size=${size}, termo=${termo}, sort='dtFim', dir=${sort == 'dtFim' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-decoration-none text-dark">Data de Fim <i
                                            th:class="${sort == 'dtFim'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i></a>
                                </th>
                                <th class="text-center pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="g : ${paginaGestoes.content}">
                                <td class="ps-4 fw-bold text-cremepe" th:text="${g.nomeGestao}">Nome</td>
                                <td th:text="${#temporals.format(g.dtInicio, 'dd/MM/yyyy')}">01/01/2023</td>
                                <td th:text="${#temporals.format(g.dtFim, 'dd/MM/yyyy')}">31/12/2025</td>
                                <td class="text-center pe-4">
                                    <a th:href="@{'/gestoes/editar/' + ${g.idGestao}}"
                                        class="btn btn-sm btn-outline-primary me-1" title="Editar Gestão"><i
                                            class="fa-solid fa-pen-to-square"></i></a>
                                    <button type="button" class="btn btn-sm btn-outline-danger me-1" data-role="excluir"
                                        data-url="/gestoes/excluir/" th:data-id="${g.idGestao}"
                                        th:data-nome="${g.nomeGestao}" title="Excluir Gestão">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                    <a th:href="@{'/gestao-conselheiros/vincular/' + ${g.idGestao}}"
                                        class="btn btn-sm btn-outline-success" title="Composição da Gestão">
                                        <i class="fa-solid fa-user-plus"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(paginaGestoes.content)}">
                                <td colspan="4" class="text-center py-4 text-muted">Nenhuma gestão encontrada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card-footer bg-white border-top-0 py-3" th:if="${size != 0 and paginaGestoes.totalPages > 1}"
                th:with="start=${paginaGestoes.number > 2 ? paginaGestoes.number - 2 : 0}, 
                      end=${paginaGestoes.number + 2 < paginaGestoes.totalPages - 1 ? paginaGestoes.number + 2 : paginaGestoes.totalPages - 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${paginaGestoes.first} ? 'disabled'"><a class="page-link"
                                th:href="@{/gestoes(page=${paginaGestoes.number - 1}, size=${size}, termo=${termo}, sort=${sort}, dir=${dir})}">Anterior</a>
                        </li>
                        <li class="page-item" th:if="${start > 0}"><a class="page-link"
                                th:href="@{/gestoes(page=0, size=${size}, termo=${termo}, sort=${sort}, dir=${dir})}">1</a>
                        </li>
                        <li class="page-item disabled" th:if="${start > 1}"><a class="page-link" href="#">...</a></li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(start, end)}"
                            th:classappend="${paginaGestoes.number == i} ? 'active'">
                            <a class="page-link"
                                th:href="@{/gestoes(page=${i}, size=${size}, termo=${termo}, sort=${sort}, dir=${dir})}"
                                th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item disabled" th:if="${end < paginaGestoes.totalPages - 2}"><a
                                class="page-link" href="#">...</a></li>
                        <li class="page-item" th:if="${end < paginaGestoes.totalPages - 1}"><a class="page-link"
                                th:href="@{/gestoes(page=${paginaGestoes.totalPages - 1}, size=${size}, termo=${termo}, sort=${sort}, dir=${dir})}"
                                th:text="${paginaGestoes.totalPages}">10</a></li>
                        <li class="page-item" th:classappend="${paginaGestoes.last} ? 'disabled'"><a class="page-link"
                                th:href="@{/gestoes(page=${paginaGestoes.number + 1}, size=${size}, termo=${termo}, sort=${sort}, dir=${dir})}">Próxima</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

        <div th:replace="~{fragments/modal-exclusao :: modal}"></div>

    </div>
</body>

</html>
