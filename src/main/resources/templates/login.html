<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jeton Cremepe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="login-body">

    <div class="login-card">
        <div class="login-header">
            <img th:src="@{/images/logo.png}" alt="Logo Cremepe" class="logo-img">
            <h4>SISTEMA JETON</h4>
            <small class="text-uppercase">Conselho Regional de Medicina de Pernambuco</small>
        </div>

        <div class="login-form-container">
            <!-- Exibe mensagem de erro da sessão (setada pelo failure handler) -->
            <div th:if="${erro}" class="alert alert-danger d-flex align-items-center mb-4 py-2 px-3 border-0 rounded"
                role="alert">
                <i class="fa-solid fa-circle-exclamation me-2 fs-5 text-danger"></i>
                <span th:text="${erro}" style="font-size: 0.9rem;"></span>
            </div>

            <!-- Exibe mensagem de logout (caso exista parâmetro) -->
            <div th:if="${param.logout != null}"
                class="alert alert-info d-flex align-items-center mb-4 py-2 px-3 border-0 rounded" role="alert">
                <i class="fa-solid fa-check-circle me-2 fs-5 text-info"></i>
                <span>Você saiu do sistema com sucesso.</span>
            </div>

            <!-- Exibe mensagem de sessão expirada -->
            <div th:if="${param.expired != null}"
                class="alert alert-warning d-flex align-items-center mb-4 py-2 px-3 border-0 rounded" role="alert">
                <i class="fa-solid fa-clock me-2 fs-5 text-warning"></i>
                <span>Sua sessão expirou. Faça login novamente.</span>
            </div>

            <form th:action="@{/autenticar}" method="post">
                <div class="mb-3">
                    <label for="cpf" class="form-label text-muted fw-bold">CPF</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
                        <input type="text" class="form-control" id="cpf" name="cpf" placeholder="Apenas números"
                            required autofocus>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="senha" class="form-label text-muted fw-bold">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" class="form-control" id="senha" name="senha"
                            placeholder="Insira a sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-login-submit w-100 py-2 login-btn">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Acessar o Sistema
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
