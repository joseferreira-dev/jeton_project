<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jeton Cremepe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; border: none; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .login-header { background-color: #2c3e50; color: white; text-align: center; padding: 20px; border-radius: 10px 10px 0 0; }
    </style>
</head>
<body>

<div class="card login-card">
    <div class="login-header">
        <i class="fa-solid fa-scale-balanced fa-3x mb-2"></i>
        <h4>Sistema Jeton</h4>
        <small>Conselho Regional de Medicina</small>
    </div>
    
    <div class="card-body p-4">
        <div th:if="${erro}" class="alert alert-danger text-center" role="alert">
            <i class="fa-solid fa-circle-exclamation me-1"></i> <span th:text="${erro}"></span>
        </div>

        <form th:action="@{/autenticar}" method="post">
            <div class="mb-3">
                <label for="cpf" class="form-label text-muted fw-bold">CPF</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
                    <input type="text" class="form-control" id="cpf" name="cpf" placeholder="Apenas números" required autofocus>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="senha" class="form-label text-muted fw-bold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" class="form-control" id="senha" name="senha" placeholder="Sua senha" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2" style="background-color: #2c3e50; border: none;">
                <i class="fa-solid fa-right-to-bracket me-1"></i> Entrar
            </button>
        </form>
    </div>
</div>

</body>
</html>
