<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><title>Vínculos de Conselheiros - Cremepe</title></head>
<body>
<div layout:fragment="conteudo">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 text-cremepe fw-bold"><i class="fa-solid fa-link me-2"></i> Conselheiros na Gestão</h2>
        <a th:href="@{/gestao-conselheiros/novo}" class="btn btn-cremepe"><i class="fa-solid fa-plus me-1"></i> Vincular Médico</a>
    </div>

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show"><i class="fa-solid fa-check-circle me-1"></i> <span th:text="${sucesso}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show"><i class="fa-solid fa-triangle-exclamation me-1"></i> <span th:text="${erro}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

    <form th:action="@{/gestao-conselheiros}" method="get" class="mb-4 bg-white p-3 rounded shadow-sm border border-light">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label small text-muted fw-bold">Buscar Vínculo</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" name="termo" th:value="${termo}" class="form-control border-start-0" placeholder="Médico ou Gestão...">
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label small text-muted fw-bold">Status do Vínculo</label>
                <select name="situacao" class="form-select">
                    <option value="">Todos</option>
                    <option value="A" th:selected="${situacao == 'A'}">Ativos</option>
                    <option value="I" th:selected="${situacao == 'I'}">Inativos</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted fw-bold">Exibir</label>
                <select name="size" class="form-select">
                    <option value="10" th:selected="${size == 10}">10 registros</option>
                    <option value="20" th:selected="${size == 20}">20 registros</option>
                    <option value="50" th:selected="${size == 50}">50 registros</option>
                </select>
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-filter me-1"></i> Filtrar</button>
                <a th:href="@{/gestao-conselheiros}" class="btn btn-outline-secondary w-100"><i class="fa-solid fa-eraser me-1"></i> Limpar</a>
            </div>
        </div>
    </form>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">
                                <a th:href="@{/gestao-conselheiros(page=0, size=${size}, termo=${termo}, situacao=${situacao}, sort='conselheiro.pessoa.nome', dir=${sort == 'conselheiro.pessoa.nome' and dir == 'asc' ? 'desc' : 'asc'})}" class="text-dark text-decoration-none">
                                    Médico Conselheiro <i class="fa-solid fa-sort ms-1 small text-muted"></i>
                                </a>
                            </th>
                            <th>
                                <a th:href="@{/gestao-conselheiros(page=0, size=${size}, termo=${termo}, situacao=${situacao}, sort='gestao.nomeGestao', dir=${sort == 'gestao.nomeGestao' and dir == 'asc' ? 'desc' : 'asc'})}" class="text-dark text-decoration-none">
                                    Gestão Referente <i class="fa-solid fa-sort ms-1 small text-muted"></i>
                                </a>
                            </th>
                            <th>Status</th>
                            <th class="text-center pe-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="gc : ${paginaVinculos.content}">
                            <td class="ps-4 fw-bold text-cremepe" th:text="${gc.conselheiro.pessoa.nome}">Nome do Médico</td>
                            <td th:text="${gc.gestao.nomeGestao}">Gestão 2024-2028</td>
                            <td>
                                <span th:if="${gc.inSituacao == 'A'}" class="badge bg-success">Ativo</span>
                                <span th:if="${gc.inSituacao == 'I'}" class="badge bg-secondary">Inativo</span>
                            </td>
                            <td class="text-center pe-4">
                                <button type="button" class="btn btn-sm btn-outline-danger" 
                                        th:onclick="prepararExclusao([[${gc.gestao.idGestao}]], [[${gc.conselheiro.idPessoa}]], [[${gc.conselheiro.pessoa.nome}]], [[${gc.gestao.nomeGestao}]])">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${paginaVinculos.empty}"><td colspan="4" class="text-center py-4 text-muted">Nenhum vínculo encontrado.</td></tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${paginaVinculos.totalPages > 1}" class="card-footer bg-white">
                <nav class="d-flex justify-content-center">
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${paginaVinculos.first ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/gestao-conselheiros(page=${paginaVinculos.number - 1}, size=${size}, termo=${termo}, situacao=${situacao}, sort=${sort}, dir=${dir})}"><i class="fa-solid fa-chevron-left"></i></a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, paginaVinculos.totalPages - 1)}" th:classappend="${paginaVinculos.number == i ? 'active' : ''}">
                            <a class="page-link" th:href="@{/gestao-conselheiros(page=${i}, size=${size}, termo=${termo}, situacao=${situacao}, sort=${sort}, dir=${dir})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${paginaVinculos.last ? 'disabled' : ''}">
                            <a class="page-link" th:href="@{/gestao-conselheiros(page=${paginaVinculos.number + 1}, size=${size}, termo=${termo}, situacao=${situacao}, sort=${sort}, dir=${dir})}"><i class="fa-solid fa-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalExclusao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-danger text-white border-0">
                    <h5 class="modal-title"><i class="fa-solid fa-triangle-exclamation me-2"></i> Confirmar Exclusão</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body p-4">
                    <p>Tem a certeza que pretende remover este conselheiro desta gestão?</p>
                    <div class="card bg-light border-start border-danger border-4">
                        <div class="card-body py-2">
                            <div><strong>Conselheiro:</strong> <span id="excluirNome"></span></div>
                            <div><strong>Gestão:</strong> <span id="excluirGestao"></span></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <a id="btnConfirmarExclusao" href="#" class="btn btn-danger px-4"><i class="fa-solid fa-trash-can me-1"></i> Remover</a>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function prepararExclusao(idGestao, idPessoa, nome, gestao) {
            document.getElementById('excluirNome').innerText = nome;
            document.getElementById('excluirGestao').innerText = gestao;
            var url = /*[[@{/gestao-conselheiros/excluir/}]]*/ '/gestao-conselheiros/excluir/';
            document.getElementById('btnConfirmarExclusao').setAttribute('href', url + idGestao + '/' + idPessoa);
            new bootstrap.Modal(document.getElementById('modalExclusao')).show();
        }
    </script>
</div>
</body>
</html>
