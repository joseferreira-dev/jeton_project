<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>VĂ­nculos de Conselheiros - Cremepe</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-cremepe fw-bold"><i class="fa-solid fa-link me-2"></i> VĂ­nculos de Conselheiros e GestĂµes
            </h2>
            <a th:href="@{/gestao-conselheiros/novo}" class="btn btn-success"><i class="fa-solid fa-plus me-1"></i>
                Vincular Conselheiro</a>
        </div>

        <form th:action="@{/gestao-conselheiros}" method="get" class="mb-4" data-guard-ignore>
            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="dir" th:value="${dir}">

            <div class="card shadow-sm border-success mb-4">
                <div class="card-header bg-success text-white fw-bold">
                    <i class="fa-solid fa-filter me-2"></i> Filtrar VĂ­nculos
                </div>
                <div class="card-body p-4">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Pesquisar (MĂ©dico ou GestĂŁo)</label>
                            <input type="text" name="termo" th:value="${termo}" class="form-control"
                                placeholder="Buscar por MĂ©dico ou GestĂŁo...">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Status</label>
                            <select name="situacao" id="situacao" class="form-select" onchange="this.form.submit()">
                                <option value="" th:selected="${situacao == ''}">Todos</option>
                                <option value="A" th:selected="${situacao == 'A'}">Ativos</option>
                                <option value="I" th:selected="${situacao == 'I'}">Inativos</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Exibir</label>
                            <select name="size" id="size" class="form-select" onchange="this.form.submit()">
                                <option value="10" th:selected="${size == 10}">10 registros</option>
                                <option value="20" th:selected="${size == 20}">20 registros</option>
                                <option value="50" th:selected="${size == 50}">50 registros</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2 bg-light p-3 rounded">
                        <a th:href="@{/gestao-conselheiros}" class="btn btn-outline-secondary fw-bold px-4">
                            <i class="fa-solid fa-eraser me-1"></i> Limpar Filtros
                        </a>
                        <button type="submit" class="btn btn-success fw-bold px-4">
                            <i class="fa-solid fa-magnifying-glass me-1"></i> Aplicar Filtro
                        </button>
                    </div>
                </div>
            </div>
        </form>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">
                                    <a th:href="@{/gestao-conselheiros(page=0, size=${size}, termo=${termo}, situacao=${situacao}, sort='conselheiro.pessoa.nome', dir=${sort == 'conselheiro.pessoa.nome' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        MĂ©dico Conselheiro <i
                                            th:class="${sort == 'conselheiro.pessoa.nome'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th>
                                    <a th:href="@{/gestao-conselheiros(page=0, size=${size}, termo=${termo}, situacao=${situacao}, sort='gestao.nomeGestao', dir=${sort == 'gestao.nomeGestao' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        GestĂŁo <i
                                            th:class="${sort == 'gestao.nomeGestao'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th class="text-center">Status</th>
                                <th class="text-center pe-4">AĂ§Ăµes</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="gc : ${paginaVinculos.content}">
                                <td class="ps-4 fw-bold text-cremepe" th:text="${gc.conselheiro.pessoa.nome}">Nome do
                                    MĂ©dico</td>
                                <td th:text="${gc.gestao.nomeGestao}">GestĂŁo</td>
                                <td class="text-center">
                                    <span th:if="${gc.inSituacao == 'A'}" class="badge bg-success">Ativo</span>
                                    <span th:if="${gc.inSituacao == 'I'}" class="badge bg-secondary">Inativo</span>
                                </td>
                                <td class="text-center pe-4">
                                    <button type="button" class="btn btn-sm me-1" data-role="alternar-status"
                                        th:classappend="${gc.inSituacao == 'A'} ? 'btn-outline-warning' : 'btn-outline-success'"
                                        th:data-url="@{'/gestao-conselheiros/alternar-status/' + ${gc.gestao.idGestao} + '/' + ${gc.conselheiro.idPessoa}}"
                                        th:data-mensagem="${gc.inSituacao == 'A' ? 'Deseja INATIVAR o conselheiro nesta gestĂŁo?' : 'Deseja ATIVAR o conselheiro nesta gestĂŁo? Ele serĂˇ inativado em quaisquer outras gestĂµes ativas.'}"
                                        th:data-desvalidar="${gc.inSituacao == 'A' ? 'true' : 'false'}"
                                        th:title="${gc.inSituacao == 'A' ? 'Inativar VĂ­nculo' : 'Ativar VĂ­nculo'}">
                                        <i class="fa-solid fa-power-off"></i>
                                    </button>

                                    <button type="button" class="btn btn-sm btn-outline-danger" data-role="excluir"
                                        data-url="/gestao-conselheiros/excluir/"
                                        th:data-id="${gc.gestao.idGestao + '/' + gc.conselheiro.idPessoa}"
                                        th:data-nome="${gc.conselheiro.pessoa.nome}"
                                        th:data-extra="${gc.gestao.nomeGestao}" title="Excluir vĂ­nculo">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${paginaVinculos.empty}">
                                <td colspan="4" class="text-center py-4 text-muted">Nenhum vĂ­nculo encontrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card-footer bg-white border-top-0 py-3" th:if="${size != 0 and paginaVinculos.totalPages > 1}"
                th:with="start=${paginaVinculos.number > 2 ? paginaVinculos.number - 2 : 0}, 
                      end=${paginaVinculos.number + 2 < paginaVinculos.totalPages - 1 ? paginaVinculos.number + 2 : paginaVinculos.totalPages - 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${paginaVinculos.first} ? 'disabled'"><a class="page-link"
                                th:href="@{/gestao-conselheiros(page=${paginaVinculos.number - 1}, size=${size}, termo=${termo}, situacao=${situacao}, sort=${sort}, dir=${dir})}">Anterior</a>
                        </li>
                        <li class="page-item" th:if="${start > 0}"><a class="page-link"
                                th:href="@{/gestao-conselheiros(page=0, size=${size}, termo=${termo}, situacao=${situacao}, sort=${sort}, dir=${dir})}">1</a>
                        </li>
                        <li class="page-item disabled" th:if="${start > 1}"><a class="page-link" href="#">...</a></li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(start, end)}"
                            th:classappend="${paginaVinculos.number == i} ? 'active'">
                            <a class="page-link"
                                th:href="@{/gestao-conselheiros(page=${i}, size=${size}, termo=${termo}, situacao=${situacao}, sort=${sort}, dir=${dir})}"
                                th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item disabled" th:if="${end < paginaVinculos.totalPages - 2}"><a
                                class="page-link" href="#">...</a></li>
                        <li class="page-item" th:if="${end < paginaVinculos.totalPages - 1}"><a class="page-link"
                                th:href="@{/gestao-conselheiros(page=${paginaVinculos.totalPages - 1}, size=${size}, termo=${termo}, situacao=${situacao}, sort=${sort}, dir=${dir})}"
                                th:text="${paginaVinculos.totalPages}">10</a></li>
                        <li class="page-item" th:classappend="${paginaVinculos.last} ? 'disabled'"><a class="page-link"
                                th:href="@{/gestao-conselheiros(page=${paginaVinculos.number + 1}, size=${size}, termo=${termo}, situacao=${situacao}, sort=${sort}, dir=${dir})}">PrĂłxima</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

        <div th:replace="~{fragments/modal-exclusao :: modal}"></div>
        <div th:replace="~{fragments/modal-confirmacao :: modal}"></div>

    </div>
</body>

</html>
