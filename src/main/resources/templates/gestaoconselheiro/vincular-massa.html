<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Composição da Gestão - Jeton</title>
    <style>
        .list-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #e9ecef;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item .badge {
            font-size: 0.75rem;
        }

        .list-item .form-check-input:disabled {
            cursor: not-allowed;
        }

        .badge-atividade {
            font-size: 0.7rem;
            background-color: #f59e0b;
            color: #000;
        }

        .col-header {
            background-color: #f8f9fa;
            padding: 0.75rem 1rem;
            font-weight: 600;
            border-bottom: 2px solid #dee2e6;
        }
    </style>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-users-gear me-2"></i>
                Composição: <span th:text="${gestao.nomeGestao}"></span>
            </h2>
            <p class="text-muted">Marque os conselheiros que fazem parte desta gestão.</p>
        </div>

        <div class="card shadow-sm">
            <form th:action="@{/gestao-conselheiros/vincular/salvar}" method="post" id="formComposicao"
                data-loading="true" data-loading-message="Atualizando vínculos...">
                <input type="hidden" name="idGestao" th:value="${gestao.idGestao}">

                <div class="card-body">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-header bg-success text-white fw-bold">
                                    <i class="fa-solid fa-link me-2"></i> Vinculados atualmente
                                    <span class="badge bg-light text-dark ms-2"
                                        th:text="${#lists.size(selecionadosIds)}"></span>
                                </div>
                                <div class="card-body p-0">
                                    <div class="list-container">
                                        <div th:each="c : ${conselheiros}"
                                            th:if="${#lists.contains(selecionadosIds, c.idPessoa)}" class="list-item">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" name="conselheirosIds"
                                                    th:value="${c.idPessoa}" checked
                                                    th:disabled="${#lists.contains(idsComAtividades, c.idPessoa)}">
                                                <label class="form-check-label fw-bold">
                                                    <span th:text="${c.pessoa.nome}"></span>
                                                    <span th:if="${#lists.contains(idsComAtividades, c.idPessoa)}"
                                                        class="badge badge-atividade ms-2">
                                                        <i class="fa-solid fa-file-lines me-1"></i>com atividades
                                                    </span>
                                                </label>
                                            </div>
                                            <div class="ms-auto">
                                                <span class="badge bg-secondary">CRM: <span
                                                        th:text="${c.crm}"></span></span>
                                            </div>
                                        </div>
                                        <div th:if="${#lists.isEmpty(selecionadosIds)}"
                                            class="text-center py-4 text-muted">
                                            <i class="fa-solid fa-info-circle me-2"></i>Nenhum conselheiro vinculado.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="card h-100">
                                <div class="card-header bg-secondary text-white fw-bold">
                                    <i class="fa-solid fa-user-plus me-2"></i> Disponíveis para vincular
                                    <span class="badge bg-light text-dark ms-2"
                                        th:text="${#lists.size(conselheiros) - #lists.size(selecionadosIds)}"></span>
                                </div>
                                <div class="card-body p-0">
                                    <div class="list-container">
                                        <div th:each="c : ${conselheiros}"
                                            th:unless="${#lists.contains(selecionadosIds, c.idPessoa)}"
                                            class="list-item">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" name="conselheirosIds"
                                                    th:value="${c.idPessoa}">
                                                <label class="form-check-label">
                                                    <span th:text="${c.pessoa.nome}"></span>
                                                </label>
                                            </div>
                                            <div class="ms-auto">
                                                <span class="badge bg-secondary">CRM: <span
                                                        th:text="${c.crm}"></span></span>
                                            </div>
                                        </div>
                                        <div th:if="${#lists.size(conselheiros) == #lists.size(selecionadosIds)}"
                                            class="text-center py-4 text-muted">
                                            <i class="fa-solid fa-check-circle me-2"></i>Todos os conselheiros já estão
                                            vinculados.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 p-3 bg-light rounded">
                        <div class="d-flex align-items-center gap-4">
                            <span><i class="fa-solid fa-square-check text-success me-1"></i> Vinculado (marcado)</span>
                            <span><i class="fa-regular fa-square me-1"></i> Não vinculado</span>
                            <span><span class="badge badge-atividade">com atividades</span> Não pode ser
                                desmarcado</span>
                        </div>
                    </div>
                </div>

                <div class="card-footer bg-light d-flex justify-content-end py-3">
                    <a th:href="@{/gestoes}" class="btn btn-outline-secondary me-2">Voltar</a>
                    <button type="submit" class="btn btn-success px-4">Salvar Composição</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
