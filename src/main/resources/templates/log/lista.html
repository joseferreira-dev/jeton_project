<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Logs de Auditoria - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-history me-2"></i> Logs de Auditoria
            </h2>
        </div>

        <div class="card shadow-sm border-success mb-4">
            <div class="card-header bg-success text-white fw-bold">
                <i class="fa-solid fa-filter me-2"></i> Filtrar Logs
            </div>
            <div class="card-body p-4">
                <form th:action="@{/logs}" method="get" data-guard-ignore>
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Tabela</label>
                            <select name="nomeTabela" class="form-select">
                                <option value="">Todas</option>
                                <option th:each="entry : ${opcoesTabelas}" th:value="${entry.key}"
                                    th:text="${entry.value}"
                                    th:selected="${nomeTabela != null and nomeTabela.equals(entry.key)}"></option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Buscar (usuário ou conteúdo)</label>
                            <input type="text" name="termo" class="form-control" th:value="${termo}"
                                placeholder="Digite para buscar...">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label fw-bold small text-muted">Data Inicial</label>
                            <input type="date" name="dataInicio" class="form-control" th:value="${dataInicio}">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label fw-bold small text-muted">Data Final</label>
                            <input type="date" name="dataFim" class="form-control" th:value="${dataFim}">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label fw-bold small text-muted">Exibir</label>
                            <select name="size" class="form-select" onchange="this.form.submit()">
                                <option value="10" th:selected="${size == 10}">10 registros</option>
                                <option value="20" th:selected="${size == 20}">20 registros</option>
                                <option value="50" th:selected="${size == 50}">50 registros</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2 bg-light p-3 rounded">
                        <a th:href="@{/logs}" class="btn btn-outline-secondary fw-bold px-4">
                            <i class="fa-solid fa-eraser me-1"></i> Limpar Filtros
                        </a>
                        <button type="submit" class="btn btn-success fw-bold px-4">
                            <i class="fa-solid fa-magnifying-glass me-1"></i> Aplicar Filtro
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4" style="width: 80px;">ID</th>
                                <th style="width: 160px;">
                                    <a th:href="@{/logs(page=0, size=${size}, nomeTabela=${nomeTabela}, dataInicio=${dataInicio}, dataFim=${dataFim}, termo=${termo}, sort='dataHoraLog', dir=${sort == 'dataHoraLog' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        Data/Hora
                                        <i
                                            th:class="${sort == 'dataHoraLog'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th>
                                    <a th:href="@{/logs(page=0, size=${size}, nomeTabela=${nomeTabela}, dataInicio=${dataInicio}, dataFim=${dataFim}, termo=${termo}, sort='usuario.pessoa.nome', dir=${sort == 'usuario.pessoa.nome' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        Usuário
                                        <i
                                            th:class="${sort == 'usuario.pessoa.nome'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th>
                                    <a th:href="@{/logs(page=0, size=${size}, nomeTabela=${nomeTabela}, dataInicio=${dataInicio}, dataFim=${dataFim}, termo=${termo}, sort='nomeTabela', dir=${sort == 'nomeTabela' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        Tabela
                                        <i
                                            th:class="${sort == 'nomeTabela'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th>Ação / Detalhe</th>
                                <th class="text-center pe-4" style="width: 80px;">Detalhes</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${paginaLogs.empty}">
                                <td colspan="6" class="text-center py-4 text-muted">
                                    <i class="fa-solid fa-inbox fs-2 mb-2 d-block"></i>
                                    Nenhum registro de auditoria encontrado.
                                </td>
                            </tr>
                            <tr th:each="log : ${paginaLogs.content}">
                                <td class="ps-4" th:text="${log.idLog}">#</td>
                                <td style="white-space: nowrap;"
                                    th:text="${#temporals.format(log.dataHoraLog, 'dd/MM/yyyy HH:mm:ss')}">Data</td>
                                <td>
                                    <span th:text="${log.usuario.pessoa.nome}">Usuário</span>
                                    <br>
                                    <small class="text-muted"
                                        th:text="'ID: ' + ${log.usuario.idUsuarioPessoa}">ID</small>
                                </td>
                                <td><span class="badge bg-secondary" th:text="${log.nomeTabela}">tabela</span></td>
                                <td>
                                    <div style="max-width: 480px; word-break: break-word; white-space: normal;"
                                        th:text="${#strings.abbreviate(log.textoLog, 100)}"></div>
                                </td>
                                <td class="text-center pe-4">
                                    <button type="button" class="btn btn-sm btn-outline-info" data-role="ver-log"
                                        th:data-id="${log.idLog}" th:data-texto="${log.textoLog}"
                                        title="Ver detalhes completos">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card-footer bg-white border-top-0 py-3" th:if="${size != 0 and paginaLogs.totalPages > 1}"
                th:with="start=${paginaLogs.number > 2 ? paginaLogs.number - 2 : 0},
                          end=${paginaLogs.number + 2 < paginaLogs.totalPages - 1 ? paginaLogs.number + 2 : paginaLogs.totalPages - 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${paginaLogs.first} ? 'disabled'">
                            <a class="page-link"
                                th:href="@{/logs(page=${paginaLogs.number - 1}, size=${size}, nomeTabela=${nomeTabela}, dataInicio=${dataInicio}, dataFim=${dataFim}, termo=${termo}, sort=${sort}, dir=${dir})}">Anterior</a>
                        </li>

                        <li class="page-item" th:if="${start > 0}">
                            <a class="page-link"
                                th:href="@{/logs(page=0, size=${size}, nomeTabela=${nomeTabela}, dataInicio=${dataInicio}, dataFim=${dataFim}, termo=${termo}, sort=${sort}, dir=${dir})}">1</a>
                        </li>
                        <li class="page-item disabled" th:if="${start > 1}"><span class="page-link">...</span></li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(start, end)}"
                            th:classappend="${paginaLogs.number == i} ? 'active'">
                            <a class="page-link"
                                th:href="@{/logs(page=${i}, size=${size}, nomeTabela=${nomeTabela}, dataInicio=${dataInicio}, dataFim=${dataFim}, termo=${termo}, sort=${sort}, dir=${dir})}"
                                th:text="${i + 1}">1</a>
                        </li>

                        <li class="page-item disabled" th:if="${end < paginaLogs.totalPages - 2}"><span
                                class="page-link">...</span></li>
                        <li class="page-item" th:if="${end < paginaLogs.totalPages - 1}">
                            <a class="page-link"
                                th:href="@{/logs(page=${paginaLogs.totalPages - 1}, size=${size}, nomeTabela=${nomeTabela}, dataInicio=${dataInicio}, dataFim=${dataFim}, termo=${termo}, sort=${sort}, dir=${dir})}"
                                th:text="${paginaLogs.totalPages}">Última</a>
                        </li>

                        <li class="page-item" th:classappend="${paginaLogs.last} ? 'disabled'">
                            <a class="page-link"
                                th:href="@{/logs(page=${paginaLogs.number + 1}, size=${size}, nomeTabela=${nomeTabela}, dataInicio=${dataInicio}, dataFim=${dataFim}, termo=${termo}, sort=${sort}, dir=${dir})}">Próxima</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

        <div class="modal fade" id="modalLogDetalhes" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header bg-info text-white">
                        <h5 class="modal-title"><i class="fa-solid fa-file-lines me-2"></i>Detalhes do Log</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <pre id="logDetalhesTexto"
                            style="white-space: pre-wrap; word-break: break-all; background: #f8f9fa; padding: 15px; border-radius: 5px; max-height: 500px; overflow-y: auto;"></pre>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
