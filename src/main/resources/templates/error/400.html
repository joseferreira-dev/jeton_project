<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requisição Inválida - Jeton</title>
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/font-awesome/6.4.2/css/all.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <link rel="icon" th:href="@{/favicon.png}" type="image/x-icon">
</head>

<body>
    <div class="error-container">
        <div class="error-card">
            <div class="text-center mb-4">
                <img th:src="@{/images/logo.png}" alt="Logo Cremepe" style="max-height:50px; margin-bottom:10px;">
                <h5 class="text-cremepe fw-bold" style="font-size:0.9rem; letter-spacing:1px;">SISTEMA JETON</h5>
            </div>

            <div class="error-icon error-icon-warning">
                <i class="fa-regular fa-circle-xmark"></i>
            </div>

            <h1>400 <span class="text-warning">·</span> Requisição Inválida</h1>
            <p class="subtitle">A requisição enviada não pôde ser processada.</p>

            <div class="details">
                <p><i class="fa-regular fa-circle-check me-2"></i> Verifique os dados enviados e tente novamente.</p>
                <p><i class="fa-regular fa-circle-check me-2"></i> O formato da URL ou dos parâmetros pode estar
                    incorreto.</p>
                <p><i class="fa-regular fa-circle-check me-2"></i> Se você seguiu um link, ele pode estar quebrado.</p>
            </div>

            <a th:href="@{/index}" class="btn-home">
                <i class="fa-solid fa-arrow-left me-2"></i> Voltar ao início
            </a>

            <div class="footer-links">
                <p class="text-muted small">
                    <a th:href="@{/index}">Voltar para o sistema</a>
                </p>
                <p class="text-muted small mb-0">
                    <i class="fa-regular fa-clock me-1"></i>
                    <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}"></span>
                </p>
            </div>
        </div>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
