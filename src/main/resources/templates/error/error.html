<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Jeton</title>
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/font-awesome/6.4.2/css/all.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/error.css}">
    <link rel="icon" th:href="@{/favicon.png}" type="image/x-icon">
</head>

<body>
    <div class="error-container">
        <div class="error-card">
            <div class="text-center mb-4">
                <img th:src="@{/images/logo.png}" alt="Logo Cremepe" style="max-height:50px; margin-bottom:10px;">
                <h5 class="text-cremepe fw-bold" style="font-size:0.9rem; letter-spacing:1px;">SISTEMA JETON</h5>
            </div>

            <div class="error-icon error-icon-muted">
                <i class="fa-regular fa-circle-exclamation"></i>
            </div>

            <h1>
                <span class="text-muted" th:text="${status}">500</span>
                <span class="text-muted">·</span> Ocorreu um erro
            </h1>
            <p class="subtitle" th:text="${error != null ? error : 'Não foi possível completar a operação.'}">
                Não foi possível completar a operação.
            </p>

            <div class="details">
                <p th:if="${message != null and message.length() > 0}">
                    <i class="fa-regular fa-circle-check me-2"></i>
                    <span th:text="${message}">Detalhe: erro inesperado</span>
                </p>
                <p><i class="fa-regular fa-circle-check me-2"></i> Tente recarregar a página ou tente novamente mais
                    tarde.</p>
                <p><i class="fa-regular fa-circle-check me-2"></i> Se o problema persistir, entre em contato com o
                    suporte.</p>
            </div>

            <a th:href="@{/index}" class="btn-home">
                <i class="fa-solid fa-arrow-left me-2"></i> Voltar ao início
            </a>

            <div class="footer-links">
                <p class="text-muted small">
                    <a th:href="@{/index}">Suporte</a>
                </p>
                <p class="text-muted small mb-0">
                    <i class="fa-regular fa-clock me-1"></i>
                    <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}"></span>
                </p>
            </div>
        </div>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
