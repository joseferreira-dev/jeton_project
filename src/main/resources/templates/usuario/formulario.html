<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Formulário de Usuário - Jeton</title>
</head>

<body>

    <div layout:fragment="conteudo">
        <div class="mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-user-shield me-2"></i>
                <span
                    th:text="${usuario.idUsuarioPessoa == null ? 'Novo Utilizador' : 'Editar Utilizador e Acessos'}">Título</span>
            </h2>
        </div>

        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-1"></i> <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
            <input type="hidden" th:field="*{idUsuarioPessoa}">
            <input type="hidden" th:field="*{pessoa.idPessoa}">

            <div class="row g-4">
                <div class="col-md-7">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-light fw-bold">Dados do Perfil</div>
                        <div class="card-body row g-3">
                            <div class="col-md-12">
                                <label class="form-label fw-bold">Nome Completo</label>
                                <input type="text" class="form-control" th:field="*{pessoa.nome}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">E-mail</label>
                                <input type="email" class="form-control" th:field="*{pessoa.email}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">CPF</label>
                                <input type="text" class="form-control" th:field="*{pessoa.cpf}" required
                                    placeholder="Apenas números">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Palavra-passe</label>
                                <input type="password" class="form-control" th:field="*{senha}"
                                    placeholder="Deixe em branco para não alterar">
                                <small class="text-muted" th:if="${usuario.idUsuarioPessoa != null}">Preencha apenas se
                                    desejar redefinir.</small>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Situação</label>
                                <select class="form-select" th:field="*{inSituacao}">
                                    <option value="A">Ativo</option>
                                    <option value="I">Inativo</option>
                                </select>
                            </div>

                            <div class="col-md-12 mt-4 pt-3 border-top">
                                <div class="form-check form-switch fs-5 mb-2">
                                    <input class="form-check-input" type="checkbox" id="checkConselheiro"
                                        th:field="*{eConselheiro}" onclick="toggleCrm()">
                                    <label class="form-check-label fw-bold text-primary" for="checkConselheiro">Este
                                        utilizador é um Médico Conselheiro?</label>
                                </div>
                                <div id="divCrm" style="display: none;">
                                    <label class="form-label fw-bold small text-muted">CRM-PE (Apenas números)</label>
                                    <div class="input-group w-50">
                                        <span class="input-group-text bg-light border-end-0">PE</span>
                                        <input type="number" class="form-control border-start-0" th:field="*{crm}"
                                            id="inputCrm">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-5">
                    <div class="card shadow-sm h-100 border-primary">
                        <div class="card-header bg-cremepe text-white fw-bold"><i
                                class="fa-solid fa-key me-2"></i>Níveis de Acesso</div>
                        <div class="card-body">
                            <p class="text-muted small mb-3">Marque os módulos aos quais este utilizador terá acesso. Se
                                a opção <b>"S" (Super Admin)</b> for marcada, ele terá acesso total independentemente
                                das restantes.</p>

                            <div class="list-group">
                                <label class="list-group-item" th:each="nivel : ${listaNiveisAcesso}">
                                    <input class="form-check-input me-2" type="checkbox" name="niveisAcesso"
                                        th:value="${nivel.idNivel}"
                                        th:checked="${#lists.contains(niveisAtuais, nivel.idNivel)}">
                                    <span class="fw-bold" th:text="${'[' + nivel.idNivel + ']'}"></span>
                                    <span th:text="${nivel.nomeNivel}"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-4 d-flex justify-content-end">
                <a th:href="@{/usuarios}" class="btn btn-outline-secondary me-2"><i class="fa-solid fa-xmark me-1"></i>
                    Cancelar</a>
                <button type="submit" class="btn btn-cremepe px-4"><i class="fa-solid fa-floppy-disk me-1"></i> Guardar
                    Utilizador</button>
            </div>
        </form>
    </div>
</body>

</html>
