<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha - Jeton</title>
    <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/webjars/font-awesome/6.4.2/css/all.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <img th:src="@{/images/logo.png}" class="logo-img">
            <h4>RECUPERAR SENHA</h4>
            <small>Jeton - CREMEPE</small>
        </div>
        <div class="login-form-container">
            <div th:if="${sucesso}" class="alert alert-success">
                <i class="fa-solid fa-check-circle me-2"></i> <span th:text="${sucesso}"></span>
            </div>
            <div th:if="${erro}" class="alert alert-danger">
                <i class="fa-solid fa-circle-exclamation me-2"></i> <span th:text="${erro}"></span>
            </div>

            <form th:action="@{/recuperar-senha}" method="post">
                <div class="mb-3">
                    <label for="cpfOuEmail" class="form-label text-muted fw-bold">CPF ou E-mail</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-id-card"></i></span>
                        <input type="text" class="form-control" id="cpfOuEmail" name="cpfOuEmail"
                            placeholder="Digite seu CPF ou e-mail" required autofocus>
                    </div>
                    <small class="text-muted">Informe o CPF ou e-mail cadastrado no sistema.</small>
                </div>
                <button type="submit" class="btn btn-login-submit w-100 py-2 login-btn">
                    <i class="fa-solid fa-envelope me-2"></i> Enviar nova senha
                </button>
            </form>
            <div class="mt-3 text-center">
                <a th:href="@{/login}">← Voltar ao login</a>
            </div>
        </div>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>

</html>
