<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Página não encontrada - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="text-center py-5">
            <i class="fa-solid fa-circle-exclamation text-warning fs-1"></i>
            <h2 class="mt-3">404 - Página não encontrada</h2>
            <p class="text-muted">O recurso que você tentou acessar não existe ou foi movido.</p>
            <a th:href="@{/index}" class="btn btn-success mt-3">Voltar ao início</a>
        </div>
    </div>
</body>

</html>
