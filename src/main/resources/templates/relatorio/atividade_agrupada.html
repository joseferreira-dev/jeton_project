<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Painel de Atividades - Jeton</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <link class="no-print" rel="stylesheet" th:href="@{/css/relatorio.css}">
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4 d-flex justify-content-between align-items-center">
            <h2 class="h4 text-cremepe fw-bold m-0">
                <i class="fa-solid fa-chart-column me-2"></i> Relatório Analítico de Atividades
            </h2>
            <button onclick="window.print()" class="btn btn-outline-secondary no-print fw-bold">
                <i class="fa-solid fa-print me-1"></i> Imprimir
            </button>
        </div>

        <div class="card shadow-sm mb-4 no-print">
            <div class="card-body p-4">
                <form th:action="@{/relatorios/atividades/gerar}" method="get">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Gestão Mandato</label>
                            <select class="form-select" name="idGestao" id="selectGestao"
                                onchange="atualizarConselheirosPorGestao()" required>
                                <option value="">-- Selecione a Gestão Primeiro --</option>
                                <option th:each="g : ${listaGestoes}" th:value="${g.idGestao}"
                                    th:text="${g.nomeGestao}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Médico Conselheiro (Filtrado por Gestão)</label>
                            <select class="form-select" name="idConselheiro" id="selectConselheiro" disabled>
                                <option value="">-- Todos os Conselheiros da Gestão --</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">De (Data Realização)</label>
                            <input type="date" class="form-control" name="dataInicio">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Até (Data Realização)</label>
                            <input type="date" class="form-control" name="dataFim">
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <button type="submit" class="btn btn-cremepe w-100 fw-bold">
                                <i class="fa-solid fa-magnifying-glass me-1"></i> Processar Dados do Painel
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${listaRelatorio != null && !listaRelatorio.isEmpty()}" class="dashboard-container mb-4">
            <div class="row">
                <div class="col-12 chart-wrapper">
                    <h5 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-user-doctor me-2"></i> Total de
                        Atividades por Médico Conselheiro</h5>
                    <div class="chart-box">
                        <canvas id="chartConselheiros"></canvas>
                    </div>
                </div>

                <div class="col-12 chart-wrapper">
                    <h5 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-chart-pie me-2"></i> Volume de
                        Atividades por Tipo</h5>
                    <div class="chart-box">
                        <canvas id="chartRegras"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${listaRelatorio != null && !listaRelatorio.isEmpty()}" class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0" id="tabelaRelatorio">
                        <thead class="table-cremepe text-white text-center">
                            <tr>
                                <th class="text-start ps-3">Médico Conselheiro</th>
                                <th>Gestão Mandato</th>
                                <th th:each="col : ${colunasRegras}" th:text="${col}">Regra</th>
                            </tr>
                        </thead>
                        <tbody class="text-center">
                            <tr th:each="row : ${listaRelatorio}">
                                <td class="text-start fw-bold ps-3" th:text="${row.conselheiro}">Conselheiro</td>
                                <td th:text="${row.gestao}">Gestão</td>
                                <td th:each="col : ${colunasRegras}" th:text="${row.regras.get(col)}">0</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            /*<![CDATA[*/

            // Ativa e registra globalmente o plugin de renderização de rótulos de quantidades
            Chart.register(ChartDataLabels);

            // Carga assíncrona de Conselheiros baseando-se estritamente no ID da Gestão Mandato
            function atualizarConselheirosPorGestao() {
                var gestaoId = document.getElementById('selectGestao').value;
                var selectConselheiro = document.getElementById('selectConselheiro');

                if (!gestaoId) {
                    selectConselheiro.innerHTML = '<option value="">-- Todos os Conselheiros da Gestão --</option>';
                    selectConselheiro.disabled = true;
                    return;
                }

                fetch('/atividades/api/conselheiros-por-gestao?gestaoId=' + gestaoId)
                    .then(response => response.json())
                    .then(data => {
                        selectConselheiro.innerHTML = '<option value="">-- Todos os Conselheiros da Gestão --</option>';
                        if (data && data.length > 0) {
                            data.forEach(c => {
                                selectConselheiro.innerHTML += `<option value="${c.id}">${c.nome}</option>`;
                            });
                            selectConselheiro.disabled = false;
                        }
                    });
            }

            document.addEventListener("DOMContentLoaded", function () {
                var dadosRelatorio = /*[[${listaRelatorio}]]*/[];

                if (dadosRelatorio && dadosRelatorio.length > 0) {

                    // Algoritmo para extrair e reter estritamente o Primeiro e Segundo Nome do médico
                    function obterPrimeiroESegundoNome(nomeCompleto) {
                        if (!nomeCompleto) return "";
                        var partes = nomeCompleto.trim().split(/\s+/);
                        if (partes.length > 1) {
                            return partes[0] + " " + partes[1];
                        }
                        return partes[0];
                    }

                    var labelsMedicosProcessados = dadosRelatorio.map(function (item) {
                        return obterPrimeiroESegundoNome(item.conselheiro);
                    });

                    var totaisAtividadesMedicos = dadosRelatorio.map(function (item) {
                        return Object.values(item.regras).reduce((a, b) => a + b, 0);
                    });

                    var colunasRegras = /*[[${colunasRegras}]]*/[];
                    var totaisPorRegra = colunasRegras.map(function (col) {
                        return dadosRelatorio.reduce(function (acc, item) {
                            return acc + (item.regras[col] || 0);
                        }, 0);
                    });

                    // Gráfico 1: Conselheiros
                    new Chart(document.getElementById('chartConselheiros').getContext('2d'), {
                        type: 'bar',
                        data: {
                            labels: labelsMedicosProcessados,
                            datasets: [{
                                label: 'Atividades Acumuladas',
                                data: totaisAtividadesMedicos,
                                backgroundColor: '#004b84',
                                borderWidth: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                datalabels: {
                                    anchor: 'end',
                                    align: 'top',
                                    color: '#004b84',
                                    font: { weight: 'bold', size: 11 },
                                    formatter: function (value) { return value > 0 ? value : ''; }
                                }
                            },
                            scales: {
                                x: {
                                    ticks: {
                                        minRotation: 90,
                                        maxRotation: 90,
                                        autoSkip: false
                                    }
                                },
                                y: {
                                    beginAtZero: true,
                                    ticks: { precision: 0 },
                                    grace: '8%'
                                }
                            }
                        }
                    });

                    // Gráfico 2: Categorias de Regras
                    new Chart(document.getElementById('chartRegras').getContext('2d'), {
                        type: 'pie',
                        data: {
                            labels: colunasRegras,
                            datasets: [{
                                data: totaisPorRegra,
                                backgroundColor: ['#004b84', '#0072c6', '#3a9ad9', '#74b9e7', '#aed4f1', '#ffc107', '#28a745'],
                                borderWidth: 2,
                                borderColor: '#ffffff'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    position: 'right',
                                    labels: { boxWidth: 12, font: { size: 11 } }
                                },
                                datalabels: {
                                    color: '#ffffff',
                                    font: { weight: 'bold', size: 12 },
                                    textShadowColor: 'rgba(0, 0, 0, 0.5)',
                                    textShadowBlur: 4,
                                    formatter: function (value) {
                                        return value > 0 ? value : '';
                                    }
                                }
                            }
                        }
                    });
                }
            });
            /*]]>*/
        </script>
    </div>
</body>

</html>
