<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Painel de Atividades - Jeton</title>
    <script th:src="@{/webjars/chart.js/4.5.1/dist/chart.umd.min.js}"></script>
    <script th:src="@{/webjars/chartjs-plugin-datalabels/2.2.0/dist/chartjs-plugin-datalabels.min.js}"></script>
    <link class="no-print" rel="stylesheet" th:href="@{/css/relatorio.css}">
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4 d-flex justify-content-between align-items-center">
            <h2 class="h4 text-cremepe fw-bold m-0">
                <i class="fa-solid fa-chart-column me-2"></i> Relatório de Atividades
            </h2>
            <button onclick="window.print()" class="btn btn-success no-print fw-bold">
                <i class="fa-solid fa-print me-1"></i> Imprimir
            </button>
        </div>

        <div class="card shadow-sm border-success mb-4 no-print">
            <div class="card-header bg-success text-white fw-bold">
                <i class="fa-solid fa-filter me-2"></i> Filtrar Parâmetros do Relatório
            </div>
            <div class="card-body p-4">
                <form th:action="@{/relatorios/atividades/gerar}" method="get" data-guard-ignore>
                    <div class="row g-3 align-items-end">

                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">Gestão</label>
                            <select class="form-select" name="idGestao" id="selectGestao"
                                data-role="atualizar-conselheiros-relatorio" required>
                                <option value="">Selecione a Gestão</option>
                                <option th:each="g : ${listaGestoes}" th:value="${g.idGestao}" th:text="${g.nomeGestao}"
                                    th:selected="${g.idGestao == idGestaoSelecionada}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">Conselheiro (Opcional)</label>
                            <select class="form-select" name="idConselheiro">
                                <option value="">Todos os Conselheiros</option>
                                <option th:each="c : ${listaConselheiros}" th:value="${c.idPessoa}"
                                    th:text="${c.pessoa.nome}" th:selected="${c.idPessoa == idConselheiroSelecionado}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label fw-bold small text-muted">Data Inicial (Opcional)</label>
                            <input type="date" class="form-control" name="dataInicio" th:value="${dataInicio}">
                        </div>

                        <div class="col-md-2">
                            <label class="form-label fw-bold small text-muted">Data Final (Opcional)</label>
                            <input type="date" class="form-control" name="dataFim" th:value="${dataFim}">
                        </div>

                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2 bg-light p-3 rounded">
                        <a th:href="@{/relatorios/atividades}" class="btn btn-outline-secondary fw-bold px-4">
                            <i class="fa-solid fa-eraser me-1"></i> Limpar Filtros
                        </a>
                        <button type="submit" class="btn btn-success fw-bold px-4">
                            <i class="fa-solid fa-chart-pie me-1"></i> Gerar Relatório
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${listaRelatorio != null && !listaRelatorio.isEmpty()}" class="dashboard-container mb-4">
            <div class="row">
                <div class="col-12 chart-wrapper">
                    <h5 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-user-doctor me-2"></i> Total de
                        Atividades por Médico Conselheiro</h5>
                    <div class="chart-box">
                        <canvas id="chartConselheiros"></canvas>
                    </div>
                </div>

                <div class="col-12 chart-wrapper">
                    <h5 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-chart-pie me-2"></i> Volume de
                        Atividades por Tipo</h5>
                    <div class="chart-box">
                        <canvas id="chartRegras"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${listaRelatorio != null && !listaRelatorio.isEmpty()}" class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle mb-0" id="tabelaRelatorio">
                        <thead class="table-cremepe text-white text-center">
                            <tr>
                                <th class="text-start ps-3">Médico Conselheiro</th>
                                <th>Gestão Mandato</th>
                                <th th:each="col : ${colunasRegras}" th:text="${col}">Regra</th>
                            </tr>
                        </thead>
                        <tbody class="text-center">
                            <tr th:each="row : ${listaRelatorio}">
                                <td class="text-start fw-bold ps-3" th:text="${row.conselheiro}">Conselheiro</td>
                                <td th:text="${row.gestao}">Gestão</td>
                                <td th:each="col : ${colunasRegras}" th:text="${row.regras.get(col)}">0</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            window._dadosRelatorio = /*[[${listaRelatorio}]]*/[];
        </script>
    </div>
</body>

</html>
