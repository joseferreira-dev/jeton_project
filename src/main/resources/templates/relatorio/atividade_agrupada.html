<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">
<head>
    <title>Relatório de Atividades - Jeton</title>
    <style>
        /* Estilos específicos para impressão do relatório */
        @media print {
            .sidebar, .navbar-top, .navbar-cremepe, form, .btn, footer { display: none !important; }
            .main-wrapper { margin: 0 !important; padding: 0 !important; width: 100% !important; }
            .card { border: none !important; box-shadow: none !important; }
            body { background-color: white !important; }
        }
    </style>
</head>
<body>
<div layout:fragment="conteudo">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 text-cremepe fw-bold"><i class="fa-solid fa-chart-column me-2"></i> Relatório de Atividades Conselhais (Agrupado)</h2>
        <button type="button" onclick="window.print()" class="btn btn-outline-secondary">
            <i class="fa-solid fa-print me-1"></i> Imprimir / PDF
        </button>
    </div>

    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show"><i class="fa-solid fa-triangle-exclamation me-1"></i> <span th:text="${erro}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

    <form th:action="@{/relatorios/atividades/gerar}" method="get" class="mb-4 bg-white p-3 rounded shadow-sm border border-light">
        <div class="row g-2 align-items-center">
            
            <div class="col-md-5">
                <div class="input-group">
                    <label class="input-group-text bg-light" for="idGestao">Gestão Base <span class="text-danger ms-1">*</span></label>
                    <select name="idGestao" id="idGestao" class="form-select" required>
                        <option value="">Selecione uma Gestão...</option>
                        <option th:each="g : ${listaGestao}" th:value="${g.idGestao}" th:text="${g.nomeGestao}" th:selected="${param.idGestao != null and param.idGestao.toString() == g.idGestao.toString()}"></option>
                    </select>
                </div>
            </div>
            
            <div class="col-md-3">
                <div class="input-group">
                    <label class="input-group-text bg-light" for="conselheiro">Conselheiro</label>
                    <select name="idConselheiro" id="conselheiro" class="form-select">
                        <option value="">Todos os conselheiros</option>
                        <option th:each="c : ${listaConselheiros}" th:value="${c.idPessoa}" th:text="${c.pessoa.nome}" th:selected="${param.idConselheiro != null and param.idConselheiro.toString() == c.idPessoa.toString()}"></option>
                    </select>
                </div>
            </div>

            <div class="col-md-4 d-flex gap-2">
                <button type="submit" class="btn btn-cremepe w-100"><i class="fa-solid fa-gears me-1"></i> Processar Dados</button>
                <a th:href="@{/relatorios/atividades}" class="btn btn-outline-secondary w-50" title="Limpar Filtros"><i class="fa-solid fa-eraser"></i></a>
            </div>
        </div>
    </form>

    <div class="card shadow-sm mb-4">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-bordered mb-0 align-middle">
                    <thead class="table-light" style="border-bottom: 2px solid var(--cremepe-gold);">
                        <tr>
                            <th class="ps-4">Médico Conselheiro</th>
                            <th>Gestão Referente</th>
                            
                            <th class="text-center" th:if="${colunasRegras != null}" 
                                th:each="nomeRegra : ${colunasRegras}" 
                                th:text="${nomeRegra}">
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="linha : ${listaRelatorio}">
                            <td class="ps-4 fw-bold text-dark" th:text="${linha.conselheiro}">Nome do Médico</td>
                            <td class="text-muted small" th:text="${linha.gestao}">Nome da Gestão</td>
                            
                            <td class="text-center fw-semibold text-cremepe" 
                                th:each="valor : ${linha.regras.values()}" 
                                th:text="${valor}">
                            </td>
                        </tr>
                        
                        <tr th:if="${#lists.isEmpty(listaRelatorio)}">
                            <td colspan="100%" class="text-center py-5 text-muted">
                                <i class="fa-solid fa-inbox fa-3x mb-3 text-light"></i><br>
                                Nenhuma atividade foi encontrada para os filtros aplicados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
</div>
</body>
</html>
