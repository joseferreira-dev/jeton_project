<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Formulário de Portaria - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-file-signature me-2"></i>
                <span th:text="${portaria.idPortaria == null ? 'Nova Portaria' : 'Editar Portaria'}"></span>
            </h2>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form th:action="@{/portarias/salvar}" th:object="${portaria}" method="post">
                    <input type="hidden" th:field="*{idPortaria}">
                    <input type="hidden" th:field="*{inRevogado}">

                    <div class="row g-4">
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Número da Portaria</label>
                            <input type="number" class="form-control" th:field="*{numero}"
                                data-validate="required integer min:1" required title="Número da portaria">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Ano</label>
                            <input type="number" class="form-control" th:field="*{ano}"
                                data-validate="required integer min:2000 max:2100" required
                                title="Ano de publicação da portaria">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Data de Início da Vigência</label>
                            <input type="date" class="form-control"
                                th:value="${#temporals.format(portaria.dtInicioVigencia, 'yyyy-MM-dd')}"
                                name="dtInicioVigencia" data-validate="required date" required
                                title="Data de início da vigência da portaria">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold">Data de Fim da Vigência</label>
                            <input type="date" class="form-control"
                                th:value="${#temporals.format(portaria.dtFimVigencia, 'yyyy-MM-dd')}"
                                name="dtFimVigencia" data-validate="date"
                                title="Data de fim da vigência (deixe em branco se for indeterminado)">
                            <div class="form-text">Deixe em branco se a portaria for por tempo indeterminado.</div>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold">Link de Publicação (Opcional)</label>
                            <input type="url" class="form-control" th:field="*{linkPublicado}"
                                placeholder="Ex: https://www.in.gov.br/dou..."
                                title="Link para a publicação oficial no Diário Oficial ou semelhante (opcional)">
                        </div>
                    </div>

                    <div class="mt-5 border-top pt-4 d-flex justify-content-end align-items-center">
                        <div>
                            <a th:href="@{/portarias}" class="btn btn-outline-secondary me-2">Cancelar</a>
                            <button type="submit" class="btn btn-success">Salvar Portaria</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
