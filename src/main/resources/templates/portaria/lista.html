<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Portarias - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-cremepe fw-bold"><i class="fa-solid fa-file-signature me-2"></i> Portarias</h2>
            <a th:href="@{/portarias/novo}" class="btn btn-success"><i class="fa-solid fa-plus me-1"></i> Nova
                Portaria</a>
        </div>

        <form th:action="@{/portarias}" method="get" class="mb-4" data-guard-ignore>
            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="dir" th:value="${dir}">

            <div class="card shadow-sm border-success mb-4">
                <div class="card-header bg-success text-white fw-bold">
                    <i class="fa-solid fa-filter me-2"></i> Filtrar Portarias
                </div>
                <div class="card-body p-4">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Pesquisar (Número ou Ano)</label>
                            <input type="text" name="termo" th:value="${termo}" class="form-control"
                                placeholder="Buscar Número ou Ano...">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Estado</label>
                            <select name="situacao" id="situacao" class="form-select" onchange="this.form.submit()">
                                <option value="">Todos</option>
                                <option value="N" th:selected="${situacao == 'N'}">Em Vigor</option>
                                <option value="S" th:selected="${situacao == 'S'}">Revogada</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Exibir</label>
                            <select name="size" id="size" class="form-select" onchange="this.form.submit()">
                                <option value="10" th:selected="${size == 10}">10 registros</option>
                                <option value="20" th:selected="${size == 20}">20 registros</option>
                                <option value="50" th:selected="${size == 50}">50 registros</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2 bg-light p-3 rounded">
                        <a th:href="@{/portarias}" class="btn btn-outline-secondary fw-bold px-4">
                            <i class="fa-solid fa-eraser me-1"></i> Limpar Filtros
                        </a>
                        <button type="submit" class="btn btn-success fw-bold px-4">
                            <i class="fa-solid fa-magnifying-glass me-1"></i> Aplicar Filtro
                        </button>
                    </div>
                </div>
            </div>
        </form>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Portaria</th>
                                <th>Período de Vigência</th>
                                <th>Link de Publicação</th>
                                <th class="text-center">Estado</th>
                                <th class="text-center pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${paginaPortarias.content}">
                                <td class="ps-4 fw-bold text-cremepe" th:text="${'Portaria ' + p.numero + '/' + p.ano}">
                                    Portaria</td>
                                <td>
                                    <div>
                                        <i class="fa-regular fa-calendar-check me-1 text-success"></i>
                                        <span th:if="${p.dtInicioVigencia != null}"
                                            th:text="${#temporals.format(p.dtInicioVigencia, 'dd/MM/yyyy')}"></span>
                                        <span th:unless="${p.dtInicioVigencia != null}" class="text-muted">Não
                                            definido</span>
                                    </div>
                                    <div>
                                        <i class="fa-regular fa-calendar-xmark me-1 text-danger"></i>
                                        <span th:if="${p.dtFimVigencia != null}"
                                            th:text="${#temporals.format(p.dtFimVigencia, 'dd/MM/yyyy')}"></span>
                                        <span th:unless="${p.dtFimVigencia != null}"
                                            class="badge bg-secondary">Indeterminado</span>
                                    </div>
                                </td>
                                <td>
                                    <a th:if="${p.linkPublicado != null and !p.linkPublicado.isEmpty()}"
                                        th:href="${p.linkPublicado}" target="_blank"
                                        class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-link"></i> Aceder
                                        Link</a>
                                    <span th:unless="${p.linkPublicado != null and !p.linkPublicado.isEmpty()}"
                                        class="text-muted small">Sem link</span>
                                </td>
                                <td class="text-center">
                                    <span th:if="${p.inRevogado == 'N'}" class="badge bg-success"><i
                                            class="fa-solid fa-check me-1"></i> Em Vigor</span>
                                    <span th:if="${p.inRevogado == 'S'}" class="badge bg-danger"><i
                                            class="fa-solid fa-ban me-1"></i> Revogada</span>
                                </td>
                                <td class="text-center pe-4">
                                    <a th:href="@{'/portarias/editar/' + ${p.idPortaria}}"
                                        class="btn btn-sm btn-outline-primary me-1" title="Editar portaria">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </a>

                                    <a href="#" class="btn btn-sm btn-outline-danger me-1" data-role="confirmar-acao"
                                        th:data-url="'/portarias/excluir/' + ${p.idPortaria}"
                                        data-mensagem="Deseja EXCLUIR permanentemente esta Portaria? Apenas possível se não houver regras vinculadas."
                                        data-cor="btn-danger" title="Excluir portaria">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </a>

                                    <a th:if="${p.inRevogado == 'N'}" href="#" class="btn btn-sm btn-outline-danger"
                                        data-role="confirmar-acao" th:data-url="'/portarias/revogar/' + ${p.idPortaria}"
                                        data-mensagem="Tem certeza que deseja REVOGAR esta Portaria? Ela deixará de ser listada para novos cadastros."
                                        data-cor="btn-danger" title="Revogar portaria">
                                        <i class="fa-solid fa-ban"></i>
                                    </a>

                                    <a th:if="${p.inRevogado == 'S'}" href="#" class="btn btn-sm btn-outline-success"
                                        data-role="confirmar-acao"
                                        th:data-url="'/portarias/restaurar/' + ${p.idPortaria}"
                                        data-mensagem="Tem certeza que deseja RESTAURAR esta Portaria para o estado Em Vigor?"
                                        data-cor="btn-success" title="Restaurar portaria (volta a estar em vigor)">
                                        <i class="fa-solid fa-rotate-left"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${paginaPortarias.empty}">
                                <td colspan="5" class="text-center py-4 text-muted">Nenhuma portaria encontrada para os
                                    filtros aplicados.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div th:replace="~{fragments/paginacao :: paginacao(
                page=${paginaPortarias}, 
                urlBase='/portarias', 
                params=${ {size: size, termo: termo, situacao: situacao, sort: sort, dir: dir} }
            )}"></div>
        </div>

        <div th:replace="~{fragments/modal-confirmacao :: modal}"></div>

    </div>
</body>

</html>
