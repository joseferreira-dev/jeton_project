<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <meta charset="UTF-8">
    <title>Criar Atividades em Lote - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-layer-group me-2"></i> Criar Atividades em Lote
            </h2>
            <p class="text-muted">Preencha os dados comuns e selecione os conselheiros participantes.</p>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form th:action="@{/atividades/lote/salvar}" method="post" enctype="multipart/form-data" id="formLote"
                    data-loading="true" data-loading-message="Criando atividades em lote...">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Gestão</label>
                            <select class="form-select" name="idGestao" id="selectGestao"
                                data-role="atualizar-conselheiros" data-validate="required" required
                                title="Selecione a gestão à qual esta atividade está vinculada">
                                <option value="">Selecione a Gestão Primeiro</option>
                                <option th:each="g : ${listaGestoes}" th:value="${g.idGestao}"
                                    th:text="${g.nomeGestao}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Data e Horário da Atividade</label>
                            <input type="datetime-local" class="form-control" name="dataHoraAtividade"
                                id="dataAtividade" data-validate="required datetime" required
                                title="Data e horário em que a atividade foi realizada">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Turno</label>
                            <input type="text" class="form-control" id="turnoVisual" value="Automático (via Horário)"
                                disabled>
                            <small class="text-muted" style="font-size: 0.70rem;">M (06h00-11h59) | T (12h00-17h59) | N
                                (18h00-23h59)</small>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Conselheiros (selecione um ou mais)</label>
                            <select class="form-select" name="idsConselheiros" id="selectConselheiros" multiple
                                size="12" required disabled data-validate="required"
                                title="Selecione os conselheiros que exerceram a atividade">
                                <option value="">Aguardando Gestão</option>
                            </select>
                            <small class="text-muted">Segure Ctrl para selecionar vários.</small>
                        </div>

                        <div class="col-md-6" id="divSelecionadosLote">
                            <label class="form-label fw-bold">Conselheiros selecionados</label>
                            <div id="listaSelecionados" class="border rounded p-2 bg-light"
                                style="min-height: 266px; max-height: 266px; overflow-y: auto;">
                                <span class="text-muted">Nenhum selecionado</span>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Resolução Aplicada (Identificada por Data)</label>
                            <input type="text" class="form-control" id="nomeResolucaoVisual" readonly
                                placeholder="Selecione a data para identificar">
                            <input type="hidden" name="idResolucao" id="idResolucaoHidden">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Portaria Aplicada (Identificada por Data)</label>
                            <input type="text" class="form-control" id="nomePortariaVisual" readonly
                                placeholder="Selecione a data para identificar">
                            <input type="hidden" name="idPortaria" id="idPortariaHidden">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold">Regra Enquadrada (Atividade
                                Específica)</label>
                            <select class="form-select" name="idRegra" id="selectRegra" required disabled
                                data-validate="required" title="Selecione a regra que melhor enquadra a atividade">
                                <option value="">Escolha a documentação acima para desbloquear as regras</option>
                            </select>
                        </div>

                        <div th:replace="~{fragments/guia-atividade :: guia}"></div>
                    </div>

                    <div class="row g-4 mt-2">
                        <div class="col-md-12">
                            <div class="card bg-light border-dashed">
                                <div class="card-body">
                                    <h6 class="fw-bold mb-3"><i class="fa-solid fa-paperclip me-2"></i>Anexar
                                        Comprovante</h6>
                                    <div class="row g-3">
                                        <div class="col-md-8">
                                            <label class="form-label small fw-bold">Nome do Comprovante</label>
                                            <input type="text" class="form-control form-control-sm"
                                                name="nomeComprovanteUsuario"
                                                placeholder="Ex: Ata de Reunião (18/05/26)"
                                                title="Dê um nome descritivo ao comprovante para identificação futura">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label small fw-bold">Tipo de Documento</label>
                                            <select class="form-select form-select-sm" name="idTipoAnexo"
                                                title="Selecione o tipo de documento anexado (PDF, imagem, etc.)">
                                                <option value="">Selecione o Tipo</option>
                                                <option th:each="t : ${listaTiposAnexo}" th:value="${t.idTipo}"
                                                    th:text="${t.nome}"></option>
                                            </select>
                                        </div>
                                        <div class="col-md-12">
                                            <label class="form-label small fw-bold">Arquivo (PDF ou Imagem)</label>
                                            <div class="file-upload-container">
                                                <input type="file" class="form-control form-control-sm" name="file"
                                                    accept=".pdf,image/*" data-role="file-upload"
                                                    title="Envie o comprovante em formato PDF ou imagem (JPG, PNG)">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 border-top pt-4 d-flex justify-content-between align-items-center">
                        <div>
                            <a th:href="@{/atividades}" class="btn btn-outline-secondary me-2">Cancelar</a>
                            <button type="submit" class="btn btn-cremepe px-4">Salvar Atividades</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
