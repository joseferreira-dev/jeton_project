<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Registar Atividade - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-clipboard-check me-2"></i>
                <span
                    th:text="${atividade.idAtividade == null ? 'Registar Nova Atividade' : 'Validar / Editar Atividade'}"></span>
            </h2>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form th:action="@{/atividades/salvar}" th:object="${atividade}" method="post"
                    enctype="multipart/form-data" id="formAtividade" data-loading="true"
                    data-loading-message="Salvando atividade...">
                    <input type="hidden" th:field="*{idAtividade}">
                    <input type="hidden" th:field="*{dataHoraRegistro}">
                    <input type="hidden" th:field="*{inSituacao}">

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Gestão Referente</label>
                            <select class="form-select" th:field="*{gestao.idGestao}" id="selectGestao"
                                data-role="atualizar-conselheiros" data-validate="required" required>
                                <option value="">-- Selecione a Gestão Primeiro --</option>
                                <option th:each="g : ${listaGestoes}" th:value="${g.idGestao}"
                                    th:text="${g.nomeGestao}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Conselheiro</label>
                            <select class="form-select" th:field="*{conselheiro.idPessoa}" id="selectConselheiro"
                                required th:disabled="${atividade.idAtividade == null}" data-validate="required">
                                <option value="">-- Aguardando Gestão --</option>
                                <option th:if="${atividade.conselheiro != null}"
                                    th:value="${atividade.conselheiro.idPessoa}"
                                    th:text="${atividade.conselheiro.pessoa?.nome}" selected></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Data e Horário da Atividade</label>
                            <input type="datetime-local" class="form-control" name="dataAtividadePura"
                                id="dataAtividade"
                                th:value="${atividade.dataHoraAtividade != null ? #temporals.format(atividade.dataHoraAtividade, 'yyyy-MM-dd''T''HH:mm') : ''}"
                                data-role="atualizar-regras" data-validate="required datetime" required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold">Turno</label>
                            <input type="text" class="form-control" id="turnoVisual" value="Automático (via Horário)"
                                disabled>
                            <small class="text-muted" style="font-size: 0.70rem;">M (06h00-11h59) | T (12h00-17h59) | N
                                (18h00-23h59)</small>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Resolução Aplicada (Identificada por Data)</label>
                            <input type="text" class="form-control" id="nomeResolucaoVisual" readonly
                                placeholder="Selecione a data para identificar">
                            <input type="hidden" th:field="*{regra.resolucao.idResolucao}" id="idResolucaoHidden">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Portaria Aplicada (Identificada por Data)</label>
                            <input type="text" class="form-control" id="nomePortariaVisual" readonly
                                placeholder="Selecione a data para identificar">
                            <input type="hidden" th:field="*{regra.portaria.idPortaria}" id="idPortariaHidden">
                        </div>

                        <div class="col-md-2 d-flex align-items-end">
                            <button type="button" class="btn btn-outline-secondary w-100" data-role="resetar-filtros"><i
                                    class="fa-solid fa-eraser me-1"></i> Limpar</button>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold text-cremepe">Regra Enquadrada (Atividade
                                Específica)</label>
                            <select class="form-select border-primary" th:field="*{regra.idRegra}" id="selectRegra"
                                data-role="exibir-guia" required th:disabled="${atividade.idAtividade == null}"
                                data-validate="required">
                                <option value="">-- Escolha a documentação acima para desbloquear as regras --</option>
                                <option th:if="${atividade.regra != null}" th:value="${atividade.regra.idRegra}"
                                    th:text="${atividade.regra.nomeRegra}" selected></option>
                            </select>
                        </div>

                        <div class="col-md-12" id="boxGuia" style="display: none;">
                            <div class="alert alert-info border-0 shadow-sm mb-0">
                                <h6 class="fw-bold text-primary"><i class="fa-solid fa-circle-info me-2"></i>Guia de
                                    Verificação da Atividade</h6>
                                <hr class="my-2">
                                <div class="row">
                                    <div class="col-md-9">
                                        <small class="d-block text-muted fw-bold">Descrição da Atividade:</small>
                                        <span id="guiaDescricao"></span>
                                    </div>
                                    <div class="col-md-3 text-end">
                                        <small class="d-block text-muted fw-bold">Pontuação:</small>
                                        <span class="badge bg-primary fs-6" id="guiaPontos">0</span> pontos
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-4 mt-2">
                        <div class="col-md-12">
                            <div class="card bg-light border-dashed">
                                <div class="card-body">
                                    <h6 class="fw-bold mb-3"><i class="fa-solid fa-paperclip me-2"></i>Anexar
                                        Comprovante (Obrigatório para Jeton)</h6>
                                    <div class="row g-3">
                                        <div class="col-md-12">
                                            <label class="form-label small fw-bold">Nome do Comprovante (Descrição para
                                                o sistema)</label>
                                            <input type="text" class="form-control form-control-sm"
                                                name="nomeComprovanteUsuario"
                                                th:value="${atividade.comprovante != null ? atividade.comprovante.nomeComprovante : ''}"
                                                placeholder="Ex: Certidão de comparecimento - Reunião X">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label small fw-bold">Tipo de Documento</label>
                                            <select class="form-select form-select-sm" name="idTipoAnexo">
                                                <option value="">-- Selecione o Tipo --</option>
                                                <option th:each="t : ${listaTiposAnexo}" th:value="${t.idTipo}"
                                                    th:text="${t.nome}"
                                                    th:selected="${atividade.comprovante != null && atividade.comprovante.tipoAnexo != null ? atividade.comprovante.tipoAnexo.idTipo == t.idTipo : false}">
                                                </option>
                                            </select>
                                        </div>
                                        <div class="col-md-8">
                                            <label class="form-label small fw-bold">Ficheiro (PDF ou Imagem)</label>
                                            <input type="file" class="form-control form-select-sm" name="file"
                                                accept=".pdf,image/*">
                                        </div>
                                    </div>
                                    <div th:if="${atividade.comprovante != null}" class="mt-3">
                                        <span class="badge bg-success">
                                            <i class="fa-solid fa-file-circle-check me-1"></i>
                                            Ficheiro atual: <span th:text="${atividade.comprovante.nomeArquivo}"></span>
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 border-top pt-4 d-flex justify-content-between align-items-center">
                        <div>
                            <a th:href="@{/atividades}" class="btn btn-outline-secondary me-2">Cancelar</a>
                            <button type="submit" class="btn btn-cremepe px-4">Salvar Atividade</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
