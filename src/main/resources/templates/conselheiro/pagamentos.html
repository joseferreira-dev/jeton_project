<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Meus Pagamentos - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4">
            <h2 class="h4 text-cremepe fw-bold"><i class="fa-solid fa-receipt me-2"></i> Meus Pagamentos (Jetons)</h2>
            <p class="text-muted">Histórico completo de todos os jetons processados e homologados.</p>
        </div>

        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-triangle-exclamation me-1"></i> <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Competência</th>
                                <th>Gestão</th>
                                <th class="text-center">Quantidade de Jetons</th>
                                <th class="text-end">Valor Total</th>
                                <th>Situação</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="j : ${pagamentos}">
                                <td th:text="${j.mes + '/' + j.ano}"></td>
                                <td th:text="${j.gestao.nomeGestao}"></td>
                                <td class="text-center fw-bold" th:text="${j.totalJeton}"></td>
                                <td class="text-end fw-bold text-success"
                                    th:text="'R$ ' + ${#numbers.formatDecimal(j.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                                <td>
                                    <span th:if="${j.inSituacao == 'E'}" class="badge bg-success">Homologado</span>
                                    <span th:if="${j.inSituacao == 'A'}" class="badge bg-warning text-dark">Processado
                                        (aberto)</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(pagamentos)}">
                                <td colspan="5" class="text-center py-4 text-muted">Nenhum pagamento registrado até o
                                    momento.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="mt-4 text-center">
            <a th:href="@{/conselheiro/dashboard}" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i> Voltar ao Painel
            </a>
        </div>
    </div>
</body>

</html>
