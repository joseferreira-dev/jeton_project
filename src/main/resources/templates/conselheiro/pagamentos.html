<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Meus Pagamentos - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-receipt me-2"></i> Meus Pagamentos (Jetons)
            </h2>
        </div>

        <!-- FILTROS -->
        <div class="card shadow-sm border-success mb-4">
            <div class="card-header bg-success text-white fw-bold">
                <i class="fa-solid fa-filter me-2"></i> Filtrar Pagamentos
            </div>
            <div class="card-body p-4">
                <form th:action="@{/conselheiro/pagamentos}" method="get" data-guard-ignore>
                    <input type="hidden" name="sort" th:value="${sort}">
                    <input type="hidden" name="dir" th:value="${dir}">

                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">Gestão</label>
                            <select class="form-select" name="idGestao">
                                <option value="">Todas as Gestões</option>
                                <option th:each="g : ${listaGestoes}" th:value="${g.idGestao}" th:text="${g.nomeGestao}"
                                    th:selected="${g.idGestao == idGestaoSelecionada}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Mês</label>
                            <select class="form-select" name="mes">
                                <option value="">Todos</option>
                                <option th:each="i, stat : ${#numbers.sequence(1, 12)}" th:value="${i}"
                                    th:selected="${i == mesSelecionado}"
                                    th:text="${ {'Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'}[stat.index] }">
                                </option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Ano</label>
                            <input type="number" class="form-control" name="ano" th:value="${anoSelecionado}"
                                placeholder="Ex: 2026" min="2000" max="2100">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-bold small text-muted">Exibir</label>
                            <select name="size" class="form-select" onchange="this.form.submit()">
                                <option value="10" th:selected="${size == 10}">10</option>
                                <option value="20" th:selected="${size == 20}">20</option>
                                <option value="50" th:selected="${size == 50}">50</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-3 pt-3 border-top d-flex justify-content-end bg-light p-3 rounded">
                        <a th:href="@{/conselheiro/pagamentos}" class="btn btn-outline-secondary fw-bold px-4">
                            <i class="fa-solid fa-eraser me-1"></i> Limpar Filtros
                        </a>
                        <button type="submit" class="btn btn-success fw-bold px-4">
                            <i class="fa-solid fa-filter me-1"></i> Filtrar
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>
                                    <a th:href="@{/conselheiro/pagamentos(page=0, size=${size}, idGestao=${idGestaoSelecionada}, mes=${mesSelecionado}, ano=${anoSelecionado}, sort='ano', dir=${sort == 'ano' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        Competência
                                        <i
                                            th:class="${sort == 'ano'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th>
                                    <a th:href="@{/conselheiro/pagamentos(page=0, size=${size}, idGestao=${idGestaoSelecionada}, mes=${mesSelecionado}, ano=${anoSelecionado}, sort='nomeGestao', dir=${sort == 'nomeGestao' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        Gestão
                                        <i
                                            th:class="${sort == 'nomeGestao'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th class="text-center">
                                    <a th:href="@{/conselheiro/pagamentos(page=0, size=${size}, idGestao=${idGestaoSelecionada}, mes=${mesSelecionado}, ano=${anoSelecionado}, sort='totalJeton', dir=${sort == 'totalJeton' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        Qtd. Jetons
                                        <i
                                            th:class="${sort == 'totalJeton'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th class="text-end">
                                    <a th:href="@{/conselheiro/pagamentos(page=0, size=${size}, idGestao=${idGestaoSelecionada}, mes=${mesSelecionado}, ano=${anoSelecionado}, sort='valor', dir=${sort == 'valor' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-dark text-decoration-none">
                                        Valor
                                        <i
                                            th:class="${sort == 'valor'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i>
                                    </a>
                                </th>
                                <th class="text-center">Situação</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(paginaPagamentos.content)}">
                                <td colspan="5" class="text-center py-4 text-muted">
                                    <i class="fa-solid fa-inbox fs-2 mb-2 d-block"></i>
                                    Nenhum pagamento registrado.
                                </td>
                            </tr>
                            <tr th:each="j : ${paginaPagamentos.content}">
                                <td>
                                    <span class="fw-bold" th:text="${j.mes + '/' + j.ano}"></span>
                                </td>
                                <td th:text="${j.nomeGestao}">Gestão</td>
                                <td class="text-center fw-bold" th:text="${j.totalJeton}">0</td>
                                <td class="text-end fw-bold text-success"
                                    th:text="${'R$ ' + #numbers.formatDecimal(j.valor, 1, 'POINT', 2, 'COMMA')}">R$ 0,00
                                </td>
                                <td class="text-center">
                                    <span th:if="${j.situacao == 'E'}" class="badge bg-success fw-bold">
                                        <i class="fa-solid fa-lock me-1"></i> Homologado
                                    </span>
                                    <span th:if="${j.situacao == 'A'}" class="badge bg-warning text-dark fw-bold">
                                        <i class="fa-solid fa-calculator me-1"></i> Processado (aberto)
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div th:replace="~{fragments/paginacao :: paginacao(
                page=${paginaPagamentos},
                urlBase='/conselheiro/pagamentos',
                params=${ {size: size, idGestao: idGestaoSelecionada, mes: mesSelecionado, ano: anoSelecionado, sort: sort, dir: dir} }
            )}"></div>
        </div>

    </div>
</body>

</html>
