<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Minhas Atividades - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-cremepe fw-bold"><i class="fa-solid fa-clipboard-list me-2"></i> Minhas Atividades</h2>
            <a th:href="@{/conselheiro/atividades/nova}" class="btn btn-cremepe">
                <i class="fa-solid fa-plus me-1"></i> Nova Atividade
            </a>
        </div>

        <!-- Mensagens flash -->
        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
            <i class="fa-solid fa-check-circle me-1"></i> <span th:text="${sucesso}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
            <i class="fa-solid fa-triangle-exclamation me-1"></i> <span th:text="${erro}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Filtros (data e situação) -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <form method="get" th:action="@{/conselheiro/atividades}" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Data Inicial</label>
                        <input type="date" name="dataInicio" th:value="${param.dataInicio}" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Data Final</label>
                        <input type="date" name="dataFim" th:value="${param.dataFim}" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold small">Situação</label>
                        <select name="situacao" class="form-select">
                            <option value="">Todas</option>
                            <option value="P" th:selected="${param.situacao == 'P'}">Pendente</option>
                            <option value="C" th:selected="${param.situacao == 'C'}">Validada</option>
                            <option value="F" th:selected="${param.situacao == 'F'}">Fechada</option>
                        </select>
                    </div>
                    <div class="col-md-1">
                        <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-filter"></i></button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tabela de atividades -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Data/Hora</th>
                                <th>Regra</th>
                                <th>Pontos</th>
                                <th>Situação</th>
                                <th class="text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="a : ${paginaAtividades.content}">
                                <td th:text="${#temporals.format(a.dataHoraAtividade, 'dd/MM/yyyy HH:mm')}"></td>
                                <td th:text="${a.regra.nomeRegra}"></td>
                                <td th:text="${a.regra.pontos * a.qtdAtividade}"></td>
                                <td>
                                    <span th:if="${a.inSituacao == 'P'}"
                                        class="badge bg-warning text-dark">Pendente</span>
                                    <span th:if="${a.inSituacao == 'C'}" class="badge bg-success">Validada</span>
                                    <span th:if="${a.inSituacao == 'F'}" class="badge bg-secondary">Fechada</span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group btn-group-sm">
                                        <a th:if="${a.comprovante != null}"
                                            th:href="@{/comprovantes/download/{id}(id=${a.comprovante.idComprovante})}"
                                            class="btn btn-outline-secondary" target="_blank" title="Ver comprovante">
                                            <i class="fa-solid fa-paperclip"></i>
                                        </a>
                                        <a th:if="${a.inSituacao == 'P'}"
                                            th:href="@{/conselheiro/atividades/editar/{id}(id=${a.idAtividade})}"
                                            class="btn btn-outline-primary" title="Editar">
                                            <i class="fa-solid fa-pen-to-square"></i>
                                        </a>
                                        <button th:if="${a.inSituacao == 'P'}" type="button"
                                            class="btn btn-outline-danger btn-excluir"
                                            data-url="/conselheiro/atividades/excluir/" th:data-id="${a.idAtividade}"
                                            th:data-nome="${a.regra.nomeRegra}">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(paginaAtividades.content)}">
                                <td colspan="5" class="text-center py-4 text-muted">Nenhuma atividade encontrada.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <!-- Paginação -->
            <div class="card-footer bg-white border-top-0 py-3" th:if="${paginaAtividades.totalPages > 1}">
                <nav>
                    <ul class="pagination justify-content-center mb-0">
                        <li class="page-item" th:classappend="${paginaAtividades.first} ? 'disabled'">
                            <a class="page-link"
                                th:href="@{/conselheiro/atividades(page=${paginaAtividades.number - 1}, dataInicio=${param.dataInicio}, dataFim=${param.dataFim}, situacao=${param.situacao})}">Anterior</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, paginaAtividades.totalPages - 1)}"
                            th:classappend="${paginaAtividades.number == i} ? 'active'">
                            <a class="page-link"
                                th:href="@{/conselheiro/atividades(page=${i}, dataInicio=${param.dataInicio}, dataFim=${param.dataFim}, situacao=${param.situacao})}"
                                th:text="${i+1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${paginaAtividades.last} ? 'disabled'">
                            <a class="page-link"
                                th:href="@{/conselheiro/atividades(page=${paginaAtividades.number + 1}, dataInicio=${param.dataInicio}, dataFim=${param.dataFim}, situacao=${param.situacao})}">Próxima</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>

</html>
