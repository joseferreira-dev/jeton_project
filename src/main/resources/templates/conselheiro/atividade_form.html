<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}">

<head>
    <title>Nova Atividade - Jeton</title>
</head>

<body>
    <div layout:fragment="conteudo">
        <div class="mb-4">
            <h2 class="h4 text-cremepe fw-bold">
                <i class="fa-solid fa-clipboard-check me-2"></i>
                <span
                    th:text="${atividade.idAtividade == null ? 'Registrar Nova Atividade' : 'Editar Atividade'}"></span>
            </h2>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form th:action="@{/conselheiro/atividades/salvar}" th:object="${atividade}" method="post"
                    enctype="multipart/form-data" id="formAtividade" data-loading="true"
                    data-loading-message="Salvando atividade...">
                    <input type="hidden" th:field="*{idAtividade}">
                    <input type="hidden" th:field="*{dataHoraRegistro}">
                    <input type="hidden" th:field="*{inSituacao}">
                    <input type="hidden" th:field="*{conselheiro.idPessoa}">

                    <input type="hidden" id="currentRegraId"
                        th:value="${atividade.regra != null ? atividade.regra.idRegra : ''}">

                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Gestão Ativa *</label>
                            <select class="form-select" id="selectGestao" name="idGestao" required
                                data-validate="required"
                                title="Selecione a gestão para a qual deseja lançar a atividade">
                                <option th:if="${#lists.size(listaGestoesAtivas) > 1}" value="">Selecione uma gestão
                                </option>
                                <option th:each="g : ${listaGestoesAtivas}" th:value="${g.idGestao}"
                                    th:text="${g.nomeGestao}" th:selected="${g.idGestao == atividade.gestao.idGestao}">
                                </option>
                            </select>
                            <small class="text-muted">Apenas gestões com vínculo ativo são exibidas.</small>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Data e Horário da Atividade *</label>
                            <input type="datetime-local" class="form-control" name="dataAtividadePura"
                                id="dataAtividade"
                                th:value="${atividade.dataHoraAtividade != null ? #temporals.format(atividade.dataHoraAtividade, 'yyyy-MM-dd') + 'T' + #temporals.format(atividade.dataHoraAtividade, 'HH:mm') : ''}"
                                data-validate="required datetime" required
                                title="Data e horário em que a atividade foi realizada">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">Turno</label>
                            <input type="text" class="form-control bg-light" id="turnoVisual" value="Automático"
                                disabled>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-bold">Regra Enquadrada *</label>
                            <select class="form-select" th:field="*{regra.idRegra}" id="selectRegra"
                                data-validate="required" required
                                title="Selecione a regra que melhor enquadra sua atividade">
                                <option value="">Selecione a data para carregar as regras</option>
                            </select>
                            <small class="text-muted">As regras disponíveis dependem da data escolhida.</small>
                            <div id="regrasLoading" class="mt-2 text-info small" style="display: none;">
                                <i class="fa-solid fa-spinner fa-spin"></i> Carregando regras...
                            </div>
                            <div id="regrasError" class="mt-2 text-danger small" style="display: none;"></div>
                        </div>

                        <div th:replace="~{fragments/guia-atividade :: guia}"></div>
                    </div>

                    <div class="row g-4 mt-2">
                        <div class="col-md-12">
                            <div
                                th:replace="~{fragments/upload-anexo :: upload(comprovante=${atividade.comprovante}, listaTipos=${listaTiposAnexo}, nomeInput='nomeComprovanteUsuario', tipoInput='idTipoAnexo', fileInput='file', exibirArquivoAtual=true)}">
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 border-top pt-4 d-flex justify-content-end align-items-center">
                        <div>
                            <a th:href="@{/conselheiro/atividades}" class="btn btn-outline-secondary me-2">Cancelar</a>
                            <button type="submit" class="btn btn-success px-4">Salvar Atividade</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
