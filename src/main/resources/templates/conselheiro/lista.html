<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Conselheiros - Cremepe</title>
</head>

<body>
    <div layout:fragment="conteudo">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 text-cremepe fw-bold"><i class="fa-solid fa-user-tie me-2"></i> Médicos Conselheiros</h2>
            <a th:href="@{/conselheiros/novo}" class="btn btn-success"><i class="fa-solid fa-plus me-1"></i> Novo
                Conselheiro</a>
        </div>

        <form th:action="@{/conselheiros}" method="get" class="mb-4" data-guard-ignore>
            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="dir" th:value="${dir}">

            <div class="card shadow-sm border-success mb-4">
                <div class="card-header bg-success text-white fw-bold">
                    <i class="fa-solid fa-filter me-2"></i> Filtrar Conselheiros
                </div>
                <div class="card-body p-4">
                    <div class="row g-3 align-items-end">

                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-muted">Pesquisar (Nome ou CRM)</label>
                            <input type="text" name="termo" th:value="${termo}" class="form-control"
                                placeholder="Nome ou CRM-PE...">
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Situação</label>
                            <select name="situacao" id="situacao" class="form-select" onchange="this.form.submit()">
                                <option value="" th:selected="${situacao == ''}">Todos</option>
                                <option value="A" th:selected="${situacao == 'A'}">Ativos</option>
                                <option value="I" th:selected="${situacao == 'I'}">Inativos</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label fw-bold small text-muted">Exibir</label>
                            <select name="size" id="size" class="form-select" onchange="this.form.submit()">
                                <option value="10" th:selected="${size == 10}">10 registros</option>
                                <option value="20" th:selected="${size == 20}">20 registros</option>
                                <option value="50" th:selected="${size == 50}">50 registros</option>
                            </select>
                        </div>

                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2 bg-light p-3 rounded">
                        <a th:href="@{/conselheiros}" class="btn btn-outline-secondary fw-bold px-4">
                            <i class="fa-solid fa-eraser me-1"></i> Limpar Filtros
                        </a>
                        <button type="submit" class="btn btn-success fw-bold px-4">
                            <i class="fa-solid fa-magnifying-glass me-1"></i> Aplicar Filtro
                        </button>
                    </div>
                </div>
            </div>
        </form>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4"><a
                                        th:href="@{/conselheiros(page=${paginaConselheiros.number}, size=${size}, termo=${termo}, situacao=${situacao}, sort='pessoa.nome', dir=${sort == 'pessoa.nome' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-decoration-none text-dark">Nome <i
                                            th:class="${sort == 'pessoa.nome'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i></a>
                                </th>
                                <th><a th:href="@{/conselheiros(page=${paginaConselheiros.number}, size=${size}, termo=${termo}, situacao=${situacao}, sort='crm', dir=${sort == 'crm' and dir == 'asc' ? 'desc' : 'asc'})}"
                                        class="text-decoration-none text-dark">CRM-PE <i
                                            th:class="${sort == 'crm'} ? (${dir == 'asc'} ? 'fa-solid fa-sort-up ms-1' : 'fa-solid fa-sort-down ms-1') : 'fa-solid fa-sort ms-1 text-muted'"></i></a>
                                </th>
                                <th>E-mail</th>
                                <th class="text-center">Situação</th>
                                <th class="text-center pe-4">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${paginaConselheiros.content}">
                                <td class="ps-4 fw-bold text-cremepe" th:text="${c.pessoa?.nome}">Nome</td>
                                <td th:text="${c.crm}">00000</td>
                                <td th:text="${c.pessoa?.email}">email@cremepe.org.br</td>
                                <td class="text-center">
                                    <span th:if="${c.inSituacao == 'A'}" class="badge bg-success">Ativo</span>
                                    <span th:if="${c.inSituacao == 'I'}" class="badge bg-danger">Inativo</span>
                                </td>
                                <td class="text-center pe-4">
                                    <a th:href="@{'/conselheiros/editar/' + ${c.idPessoa}}"
                                        class="btn btn-sm btn-outline-primary me-1" title="Editar conselheiro"><i
                                            class="fa-solid fa-pen-to-square"></i></a>

                                    <button type="button" class="btn btn-sm btn-outline-danger" data-role="excluir"
                                        data-url="/conselheiros/excluir/" th:data-id="${c.idPessoa}"
                                        th:data-nome="${c.pessoa?.nome}" th:data-extra="${c.crm}"
                                        title="Excluir conselheiro">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(paginaConselheiros.content)}">
                                <td colspan="5" class="text-center py-4 text-muted">Nenhum conselheiro encontrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div th:replace="~{fragments/paginacao :: paginacao(
                page=${paginaConselheiros}, 
                urlBase='/conselheiros', 
                params=${ {size: size, termo: termo, situacao: situacao, sort: sort, dir: dir} }
            )}"></div>
        </div>

        <div th:replace="~{fragments/modal-exclusao :: modal}"></div>

    </div>
</body>

</html>
